<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajamal Abbas Shah | Ultra-Premium Enterprise AI Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           PART 1: ULTRA-PREMIUM CSS ARCHITECTURE (DARK GLASSMORPHISM)
           ========================================================================== */
        
        :root {
            /* Deep Dark Theme Colors */
            --bg-base: #020617; /* Slate 950 */
            --bg-surface: rgba(15, 23, 42, 0.75);
            --bg-surface-hover: rgba(30, 41, 59, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.03);
            
            /* Brand Accents */
            --primary: #3b82f6; /* Blue 500 */
            --primary-hover: #2563eb;
            --primary-glow: rgba(59, 130, 246, 0.5);
            
            --secondary: #10b981; /* Emerald 500 */
            --secondary-glow: rgba(16, 185, 129, 0.5);
            
            --accent: #8b5cf6; /* Violet 500 */
            --accent-glow: rgba(139, 92, 246, 0.5);
            
            /* Utility Colors */
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            /* Text & Typography */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-dark: #0f172a;
            
            /* Borders & Shadows */
            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(59, 130, 246, 0.5);
            --shadow-float: 0 20px 40px -10px rgba(0, 0, 0, 0.7);
            --shadow-glow: 0 0 25px var(--primary-glow);
            
            /* Layout Settings */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            scroll-behavior: smooth;
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- High-End Animations --- */
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(30px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(40px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px var(--primary-glow); } 50% { box-shadow: 0 0 30px var(--primary-glow); } }
        @keyframes loadingBar { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Universal UI Components --- */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #1e40af);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 32px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
            border-color: rgba(255,255,255,0.3);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-outline {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn-outline:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; text-align: left; position: relative; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-control {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-light);
            color: white;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .form-control:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .form-control::placeholder { color: #475569; }
        
        select.form-control { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto; }
        select.form-control option { background: var(--bg-base); color: white; }

        .phone-wrapper { display: flex; gap: 10px; }
        .phone-wrapper select { width: 140px; flex-shrink: 0; }
        .phone-wrapper input { flex: 1; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        /* --- Modals (Gateway & Admins) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(16px);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
            padding: 20px;
        }

        .modal-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 45px;
            width: 100%;
            max-width: 650px;
            box-shadow: var(--shadow-float);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
        }
        .modal-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
            animation: loadingBar 3s linear infinite;
        }

        .modal-header { text-align: center; margin-bottom: 35px; }
        .modal-header h1 { font-size: 34px; font-weight: 800; background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .modal-header p { color: var(--text-muted); margin-top: 10px; font-size: 15px; }
        
        .secret-trigger { cursor: pointer; color: var(--primary); font-weight: 600; padding: 4px 8px; border-radius: 6px; transition: 0.3s; display: inline-block; }
        .secret-trigger:hover { background: rgba(59, 130, 246, 0.15); text-shadow: 0 0 10px var(--primary-glow); }

        /* --- Dashboard Layout --- */
        #dashboard { display: none; width: 100%; flex-direction: column; height: 100vh; animation: fadeIn 0.8s ease forwards; }
        
        .topbar {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: sticky; top: 0;
        }
        .topbar-brand { display: flex; align-items: center; gap: 15px; }
        .topbar-brand h2 { font-size: 22px; font-weight: 700; color: white; letter-spacing: -0.5px; }
        
        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--secondary);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot { width: 8px; height: 8px; background: var(--secondary); border-radius: 50%; box-shadow: 0 0 10px var(--secondary-glow); animation: fadeIn 1.5s infinite alternate; }

        .app-layout { display: flex; flex: 1; overflow: hidden; }

        /* --- Sidebar --- */
        .sidebar {
            width: 320px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-light);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }
        .nav-category-title { font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; padding-left: 15px; }
        
        .nav-item {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            text-align: left;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .nav-item:hover { background: var(--bg-glass); color: white; transform: translateX(5px); }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15), transparent);
            color: var(--primary);
            border-left: 3px solid var(--primary);
            font-weight: 600;
            box-shadow: inset 1px 0 0 var(--primary);
        }

        /* --- Content Area & Grid --- */
        .main-content { flex: 1; padding: 40px 50px; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        
        .tool-card {
            background: linear-gradient(145deg, var(--bg-surface), rgba(0,0,0,0.3));
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            animation: slideUpFade 0.5s ease backwards;
        }
        .tool-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }
        .tool-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 15px rgba(59, 130, 246, 0.2); }
        .tool-card:hover::after { opacity: 1; }
        
        .tool-icon {
            width: 60px; height: 60px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }
        .tool-card h3 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 10px; letter-spacing: -0.3px; }
        .tool-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

        /* --- Active Tool Workspace --- */
        #workspace { display: none; max-width: 1200px; margin: 0 auto; animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .workspace-header { margin-bottom: 35px; display: flex; flex-direction: column; gap: 10px; }
        .workspace-header h1 { font-size: 38px; font-weight: 800; letter-spacing: -1px; color: white; }
        .workspace-header p { font-size: 16px; color: var(--text-muted); max-width: 800px; line-height: 1.6; }
        
        .workspace-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 45px;
            box-shadow: var(--shadow-float);
            position: relative;
        }

        .result-panel {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: var(--radius-md);
            padding: 30px;
            margin-top: 30px;
            font-size: 16px;
            line-height: 1.8;
            color: white;
            transition: 0.3s;
        }
        .result-panel.active { border-color: var(--secondary); background: rgba(16, 185, 129, 0.05); box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
        .result-panel h4 { display: flex; align-items: center; gap: 10px; color: var(--secondary); margin-bottom: 20px; font-size: 18px; }

        /* --- Custom Tool Elements (Calculator & Loaders) --- */
        .admin-gear-btn { position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); color: var(--text-muted); width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .admin-gear-btn:hover { background: rgba(59, 130, 246, 0.1); color: var(--primary); border-color: var(--primary); transform: rotate(90deg); }

        .loader-box { display: none; align-items: center; gap: 15px; color: var(--primary); font-weight: 600; margin-top: 20px; padding: 15px; background: rgba(59, 130, 246, 0.05); border-radius: var(--radius-sm); border: 1px solid rgba(59, 130, 246, 0.2); }
        .spinner-ring { width: 24px; height: 24px; border: 3px solid rgba(59, 130, 246, 0.2); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }

        /* --- Toasts --- */
        #toastArea { position: fixed; bottom: 35px; right: 35px; z-index: 99999; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .toast {
            background: var(--bg-surface-hover);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            padding: 18px 24px;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-float);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--primary); }
        .toast-icon { font-size: 22px; }

        /* --- Media Queries --- */
        @media (max-width: 1024px) {
            .app-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-light); flex-direction: row; padding: 20px; overflow-x: auto; height: auto; }
            .nav-item { white-space: nowrap; }
            .grid-2 { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="toastArea"></div>

    <div id="adminModal" class="modal-overlay" style="display: none; z-index: 20000;">
        <div class="modal-card" style="max-width: 400px; text-align: center; border-color: var(--warning);">
            <div style="font-size: 40px; margin-bottom: 15px;">⚡</div>
            <h2 style="color: white; margin-bottom: 10px; font-weight: 800;">Developer Console</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 14px;">Enter the secure override key to bypass validation.</p>
            <input type="password" id="secretPass" class="form-control" placeholder="Enter Override Key" style="text-align: center; font-size: 22px; letter-spacing: 6px; margin-bottom: 25px; font-family: 'JetBrains Mono', monospace; color: var(--warning);">
            <button id="btnAdminVerify" class="btn-primary" style="background: linear-gradient(135deg, var(--warning), #d97706); color: #000; box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);">Authorize Override</button>
            <button id="btnAdminClose" class="btn-outline" style="width: 100%; margin-top: 12px; border: none;">Cancel</button>
        </div>
    </div>

    <div id="gateway" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h1>Premium Enterprise Hub</h1>
                <p>Architected by <span class="secret-trigger" id="triggerAdmin">Tajamal Abbas Shah</span> | hello@tajamal.me</p>
            </div>

            <form id="authForm">
                <div class="grid-2">
                    <div class="input-group full-width">

                        <input type="text" id="uName" class="form-control" required placeholder="Enter your full name">

                        <select id="uGender" class="form-control" required>
                            <option value="">Select Option</option>

                            <option value="Female">Female</option>
                            <option value="Corporate">Corporate Entity</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" id="uAge" class="form-control" required min="12" max="100" placeholder="e.g. 24">
                    </div>
                </div>

                <button type="submit" id="accessBtn" class="btn-primary" style="margin-top: 25px; padding: 18px;">
                    <span id="btnText">Verify & Initialize System</span>
                    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard">
        <div class="topbar">
            <div class="topbar-brand">
                <h2>Tajamal.me Workspace</h2>
                <div class="status-badge"><div class="status-dot"></div> System Live & Encrypted</div>
            </div>
            <div>
                <button id="btnExportDB" class="btn-outline" style="display: flex; align-items: center; gap: 8px;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export Client Database (CSV)
                </button>
            </div>
        </div>

        <div class="app-layout">
            <div class="sidebar" id="sidebar">
                </div>
            
            <div class="main-content">
                <div id="toolsGrid" class="tools-grid"></div>

                <div id="workspace">
                    <button class="btn-outline" id="btnBackToGrid" style="margin-bottom: 30px; border-radius: 30px; padding: 10px 20px;">
                        ← Return to Tool Library
                    </button>
                    
                    <div class="workspace-header">
                        <h1 id="wsTitle">Tool Title</h1>
                        <p id="wsDesc">Tool description goes here.</p>
                    </div>
                    
                    <div class="workspace-card" id="wsBody">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LEAVE THIS SCRIPT TAG OPEN FOR NEXT PARTS
                /* ==========================================================================
           PART 2: THE CORE BRAIN (SECURITY, ROUTING & VALIDATION)
           ========================================================================== */

        // --- 1. GLOBAL UTILITIES (TOASTS) ---
        window.showToast = function(msg, type = "success") {
            const area = document.getElementById('toastArea');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            toast.innerHTML = `<span class="toast-icon">${icon}</span> <div>${msg}</div>`;
            area.appendChild(toast);
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transform = 'translateX(50px)';
                setTimeout(() => toast.remove(), 400); 
            }, 3500);
        };

        // --- 2. MASSIVE COUNTRY DATABASE (NO "OTHER" OPTION) ---
        const countries = [
            {n:"Pakistan", c:"+92", l:10}, {n:"United States", c:"+1", l:10}, {n:"United Kingdom", c:"+44", l:10},
            {n:"India", c:"+91", l:10}, {n:"Canada", c:"+1", l:10}, {n:"Australia", c:"+61", l:9},
            {n:"United Arab Emirates", c:"+971", l:9}, {n:"Saudi Arabia", c:"+966", l:9}, {n:"China", c:"+86", l:11},
            {n:"Germany", c:"+49", l:10}, {n:"France", c:"+33", l:9}, {n:"Italy", c:"+39", l:10},
            {n:"Spain", c:"+34", l:9}, {n:"Brazil", c:"+55", l:11}, {n:"Japan", c:"+81", l:10},
            {n:"South Africa", c:"+27", l:9}, {n:"Russia", c:"+7", l:10}, {n:"Mexico", c:"+52", l:10},

                        <div class="grid-2">
                            <div class="input-group">
                                <label>Key Length (8-128)</label>
                                <input type="number" id="kLen" class="form-control" value="24" min="8" max="128">
                            </div>
                            <div class="input-group">
                                <label>Complexity Mode</label>
                                <select id="kComp" class="form-control">
                                    <option value="max">Maximum (Alphanumeric + Symbols)</option>
                                    <option value="med">Medium (Alphanumeric Only)</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn-primary" onclick="genKey()" style="margin-top:20px; padding:18px;">Forge Cryptographic Key</button>
                        
                        <div class="result-panel" style="text-align:center; margin-top:30px;">
                            <h4 style="justify-content:center;">Generated Key Output</h4>
                            <div id="kOut" style="font-size:26px; font-family:'JetBrains Mono', monospace; letter-spacing:4px; color:var(--primary); word-break:break-all; margin-top:20px; user-select:all;">Awaiting generation...</div>
                        </div>
                    `,
                    js: () => {
                        window.genKey = () => {
                            let len = parseInt(document.getElementById('kLen').value);
                            if(len < 8) len = 8; if(len > 128) len = 128;
                            let comp = document.getElementById('kComp').value;
                            
                            let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
                            if(comp === 'max') chars += "!@#$%^&*()_+-=[]{}|;:,.<>?";
                            
                            let key = Array.from(crypto.getRandomValues(new Uint32Array(len)))
                                .map(x => chars[x % chars.length]).join('');
                                
                            document.getElementById('kOut').innerHTML = `<span style="user-select:all;">${key}</span>`;
                            showToast("Cryptographic Key Forged Successfully", "success");
                        }
                    }
                },
                {
                    id: "t_b64", 
                    icon: "🧬", 
                    name: "Base64 Codec Engine", 
                    desc: "Encode or decode strings to/from Base64 architecture instantly.",
                    ui: () => `
                        <textarea id="bIn" class="form-control" style="min-height: 160px;" placeholder="Input string data here..."></textarea>
                        <div class="grid-2" style="margin-top: 25px;">
                            <button class="btn-outline" onclick="doB64('enc')" style="padding:15px;">Encode to Base64</button>
                            <button class="btn-outline" onclick="doB64('dec')" style="padding:15px;">Decode from Base64</button>
                        </div>
                        <div class="result-panel" style="margin-top: 30px;">
                            <h4>Output Result</h4>
                            <textarea id="bOut" class="form-control" style="min-height: 160px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); margin-top:15px;" readonly placeholder="Result will appear here..."></textarea>
                        </div>
                    `,
                    js: () => {
                        window.doB64 = (m) => {
                            let t = document.getElementById('bIn').value;
                            if(!t) return showToast("Input text is required for processing", "error");
                            try { 
                                document.getElementById('bOut').value = m === 'enc' ? btoa(t) : atob(t); 
                                showToast("Base64 Processing Complete", "success");
                            } catch(e) { 
                                showToast("Invalid Base64 string detected", "error"); 
                            }
                        }
                    }
                }
            ],
            "📝 Format & Data Processing": [
                {
                    id: "fmt_case", 
                    icon: "🔠", 
                    name: "Intelligent Case Formatter", 
                    desc: "Instantly reformat massive text blocks into standardized casing formats without server crashes.",
                    ui: () => `
                        <textarea id="cIn" class="form-control" style="min-height:180px; margin-bottom:25px;" placeholder="Input raw string data..."></textarea>
                        <div class="grid-2">
                            <button class="btn-outline" onclick="caseFmt('up')" style="padding:15px;">CONVERT TO UPPERCASE</button>
                            <button class="btn-outline" onclick="caseFmt('low')" style="padding:15px;">convert to lowercase</button>
                            <button class="btn-outline" onclick="caseFmt('title')" style="padding:15px;">Convert To Title Case</button>
                            <button class="btn-outline" onclick="caseFmt('alt')" style="padding:15px;">cOnVeRt To AlTeRnAtInG</button>
                        </div>
                    `,
                    js: () => {
                        window.caseFmt = (mode) => {
                            let t = document.getElementById('cIn');
                            if(!t.value) return showToast("Input data is required", "error");
                            
                            if(mode === 'up') t.value = t.value.toUpperCase();
                            if(mode === 'low') t.value = t.value.toLowerCase();
                            if(mode === 'title') t.value = t.value.toLowerCase().split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1):'').join(' ');
                            if(mode === 'alt') t.value = t.value.split('').map((c,i)=>i%2===0?c.toLowerCase():c.toUpperCase()).join('');
                            
                            showToast("Text Format Applied Successfully", "success");
                        }
                    }
                }
            ],
            "🗓️ Health & Timeline Analytics": [
                {
                    id: "t_age", 
                    icon: "⏳", 
                    name: "Absolute Age & Timeline Matrix", 
                    desc: "Calculates precise age metrics including exact years, months, and total cumulative days lived.",
                    ui: () => `
                        <div class="input-group">
                            <label>Select Date of Birth</label>
                            <input type="date" id="aDate" class="form-control" style="cursor:pointer; padding:18px;">
                        </div>
                        <button class="btn-primary" onclick="calcAge()" style="margin-top:20px; padding:18px;">Analyze Timeline Data</button>
                        
                        <div class="result-panel" id="aResPanel" style="display:none; text-align:center; margin-top:30px;">
                            <h4 style="justify-content:center; margin-bottom:25px;">Current Timeline Status</h4>
                            <div style="font-size:42px; font-weight:800; color:var(--primary); line-height:1.2;" id="aMain"></div>
                            <div style="margin-top:20px; font-size:16px; color:var(--text-muted); font-weight:600; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);" id="aSub"></div>
                        </div>
                    `,
                    js: () => {
                        window.calcAge = () => {
                            let d = document.getElementById('aDate').value;
                            if(!d) return showToast("Select a valid date", "error");
                            let b = new Date(d); let t = new Date();
                            
                            let y = t.getFullYear() - b.getFullYear();
                            let m = t.getMonth() - b.getMonth();
                            if(m < 0 || (m === 0 && t.getDate() < b.getDate())) { y--; m += 12; }
                            
                            let tot = Math.floor((t - b) / (1000 * 60 * 60 * 24));
                            
                            document.getElementById('aMain').innerText = `${y} Years & ${m} Months`;
                            document.getElementById('aSub').innerText = `Total Cumulative Days Elapsed: ${tot.toLocaleString()}`;
                            document.getElementById('aResPanel').style.display = 'block';
                            showToast("Timeline Successfully Analyzed", "success");
                        }
                    }
                },
                {
                    id: "t_bmi", 
                    icon: "⚖️", 
                    name: "Clinical BMI Matrix", 
                    desc: "World Health Organization standard Body Mass Index algorithm calculating precise physiological metrics.",
                    ui: () => `
                        <div class="grid-2">
                            <div class="input-group">
                                <label>Total Weight (KG)</label>
                                <input type="number" id="hW" class="form-control" placeholder="e.g. 70">
                            </div>
                            <div class="input-group">
                                <label>Total Height (CM)</label>
                                <input type="number" id="hH" class="form-control" placeholder="e.g. 175">
                            </div>
                        </div>
                        <button class="btn-primary" onclick="calcBMI()" style="margin-top:20px; padding:18px;">Compute Index Matrix</button>
                        
                        <div class="result-panel" id="hResPanel" style="display:none; text-align:center; margin-top:30px;">
                            <div id="hRes" style="font-size:54px; font-weight:800;"></div>
                            <div id="hCat" style="margin-top:15px; font-size:20px; font-weight:700; letter-spacing:2px; text-transform:uppercase;"></div>
                        </div>
                    `,
                    js: () => {
                        window.calcBMI = () => {
                            let w = parseFloat(document.getElementById('hW').value);
                            let h = parseFloat(document.getElementById('hH').value) / 100;
                            
                            if(!w || !h) return showToast("Enter valid physical metrics", "error");
                            
                            let bmi = (w / (h * h)).toFixed(1);
                            let cat = bmi < 18.5 ? "Underweight Status" : bmi < 25 ? "Optimal Weight Status" : bmi < 30 ? "Overweight Status" : "Obese Status";
                            let col = bmi < 18.5 ? "var(--warning)" : bmi < 25 ? "var(--success)" : bmi < 30 ? "var(--warning)" : "var(--danger)";
                            
                            document.getElementById('hRes').innerText = bmi;
                            document.getElementById('hRes').style.color = col;
                            document.getElementById('hCat').innerText = cat;
                            document.getElementById('hCat').style.color = col;
                            
                            document.getElementById('hResPanel').style.display = 'block';
                            document.getElementById('hResPanel').style.borderColor = col;
                            showToast("BMI Matrix Computed", "success");
                        }
                    }
                }
            ]
        });

    </script>
</body>
</html>
