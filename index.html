<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajamal Abbas Shah | Ultra-Premium AI Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020617;
            --bg-surface: rgba(15, 23, 42, 0.75);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --border-light: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
        }

        /* The Master Container */
        .omni-container {
            width: 90%;
            max-width: 900px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #94a3b8; margin-bottom: 2rem; }

        /* The Universal Drop Zone */
        .drop-zone {
            background: var(--bg-surface);
            border: 2px dashed var(--border-light);
            border-radius: 24px;
            padding: 60px 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            backdrop-filter: blur(12px);
            position: relative;
            margin-bottom: 2rem;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary);
            box-shadow: 0 0 40px -10px var(--primary-glow);
            transform: translateY(-5px);
        }

        .drop-zone h3 { font-size: 1.5rem; margin-bottom: 10px; }
        .drop-zone p { font-size: 0.9rem; margin: 0; }

        /* The Command Bar */
        .command-wrapper {
            position: relative;
            width: 100%;
        }

        .command-input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 18px 25px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .command-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        /* The Processing Terminal (Hidden by default) */
        #terminal {
            margin-top: 2rem;
            background: #000;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #10b981;
            display: none;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #1e293b;
        }

        .status-tag {
            display: inline-block;
            margin-top: 15px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="omni-container">
        <h1>SOVEREIGN BRAIN</h1>
        <p>Universal Input Engine | No Limits. No Constraints.</p>

        <div class="drop-zone" id="dropZone">
            <div id="dropContent">
                <h3>Drop anything here</h3>
                <p>Bulk Files, Folders, Images, Code, PDFs, Videos</p>
            </div>
            <div id="fileInfo" style="display:none;">
                <h3 id="fileCount">0 Files Loaded</h3>
                <div class="status-tag">Ready for Action</div>
            </div>
        </div>

        <div class="command-wrapper">
            <input type="text" class="command-input" id="cmdInput" placeholder="What should I do with these? (e.g. 'Convert to App', 'Extract Data', 'Clone Voice')">
        </div>

        <div id="terminal"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const cmdInput = document.getElementById('cmdInput');
        const terminal = document.getElementById('terminal');
        const dropContent = document.getElementById('dropContent');
        const fileInfo = document.getElementById('fileInfo');
        const fileCountTxt = document.getElementById('fileCount');

        // Drag & Drop Logic
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                dropContent.style.display = 'none';
                fileInfo.style.display = 'block';
                fileCountTxt.innerText = `${files.length} Files / Folders Loaded`;
                logToTerminal(`System recognized ${files.length} inputs. Analyzing headers...`);
            }
        });

        // Command Input Logic
        cmdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && cmdInput.value !== "") {
                startThinking(cmdInput.value);
                cmdInput.value = "";
            }
        });

        function logToTerminal(msg) {
            terminal.style.display = 'block';
            const line = document.createElement('div');
            line.innerText = `> ${msg}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function startThinking(cmd) {
            logToTerminal(`Command Received: "${cmd}"`);
            logToTerminal(`Initializing Brain...`);
            
            setTimeout(() => logToTerminal(`Synthesizing tools for this industry...`), 800);
            setTimeout(() => logToTerminal(`Generating human-like logic blocks...`), 1500);
            setTimeout(() => logToTerminal(`Status: Prototype ready. Waiting for backend connection.`), 2500);
        }
    </script>
</body>
</html>
