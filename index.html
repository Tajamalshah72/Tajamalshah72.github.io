<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajamal Abbas Shah | Enterprise Cloud Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ================= ULTRA PREMIUM SAAS UI ================= */
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --secondary: #0ea5e9;
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.98) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 14px 28px; border-radius: var(--radius-md);
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: var(--shadow-md); width: 100%;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .btn-outline {
            background: white; border: 1px solid var(--border); color: var(--text-dark);
            padding: 10px 20px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        
        .form-control {
            background: #ffffff; border: 1px solid var(--border); color: var(--text-dark);
            padding: 14px 18px; border-radius: var(--radius-md); font-size: 15px; font-weight: 500;
            transition: all 0.3s; outline: none; width: 100%;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
        .full-width { grid-column: span 2; }

        /* --- Layout --- */
        #dashboard { width: 100%; display: flex; flex-direction: column; height: 100vh; }
        
        .navbar {
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .nav-brand h2 { font-size: 22px; font-weight: 800; color: var(--text-dark); }

        .app-layout { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 300px; background: #ffffff; border-right: 1px solid var(--border);
            padding: 30px 20px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
        }
        .nav-item {
            background: transparent; border: none; color: var(--text-muted); text-align: left;
            padding: 16px 20px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 14px;
        }
        .nav-item:hover { background: var(--bg-body); color: var(--text-dark); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); }

        .main-content { flex: 1; padding: 40px 50px; overflow-y: auto; position: relative; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }
        
        .tool-card {
            background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 30px; cursor: pointer; transition: 0.3s; box-shadow: var(--shadow-md);
            animation: fadeInScale 0.4s ease backwards;
        }
        .tool-card:hover { transform: translateY(-6px); border-color: var(--primary); box-shadow: var(--shadow-lg); }
        .tool-icon { width: 56px; height: 56px; background: var(--primary-light); color: var(--primary); border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 26px; margin-bottom: 15px; }
        .tool-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .tool-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

        /* --- Workspace --- */
        #workspace { display: none; max-width: 1100px; margin: 0 auto; animation: fadeInScale 0.4s ease; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); background: white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; margin-bottom: 30px; }
        .btn-back:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-light); }
        
        .workspace-card { background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; box-shadow: var(--shadow-lg); position: relative; }
        .result-panel { background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: var(--radius-md); padding: 25px; margin-top: 25px; min-height: 100px; font-size: 16px; line-height: 1.8; }

        /* --- Admin Settings Modal --- */
        .admin-modal { position: absolute; top: 20px; right: 20px; background: white; border: 1px solid var(--border); padding: 20px; border-radius: 12px; box-shadow: var(--shadow-lg); display: none; z-index: 50; width: 300px; }
        .admin-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; justify-content: center; align-items: center; }

        #toastArea { position: fixed; bottom: 30px; right: 30px; z-index: 99999; display: flex; flex-direction: column; gap: 15px; }
        .toast { background: white; border: 1px solid var(--border); padding: 16px 24px; border-radius: var(--radius-md); color: var(--text-dark); font-weight: 600; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-lg); }

        .loader { display: none; align-items: center; gap: 10px; color: var(--primary); font-weight: 600; margin-top: 15px; animation: pulse 1s infinite; }
        .spinner { width: 20px; height: 20px; border: 3px solid var(--primary-light); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toastArea"></div>

    <div id="dashboard">
        <div class="navbar">
            <div class="nav-brand"><h2>Tajamal.me Business Hub</h2></div>
            <div><button class="btn-outline">System Online</button></div>
        </div>

        <div class="app-layout">
            <div class="sidebar" id="sidebar"></div>
            
            <div class="main-content">
                <div id="toolsGrid" class="tools-grid"></div>

                <div id="workspace">
                    <button class="btn-back" onclick="closeWorkspace()">← Return to Tools</button>
                    <div class="workspace-header" style="margin-bottom: 20px;">
                        <h1 id="wsTitle" style="font-size: 32px;">Title</h1>
                        <p id="wsDesc" style="color: var(--text-muted);"></p>
                    </div>
                    <div class="workspace-card" id="wsBody"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg) {
            const area = document.getElementById('toastArea');
            const toast = document.createElement('div');
            toast.className = `toast`; toast.innerHTML = `✅ <div>${msg}</div>`;
            area.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ==========================================
        // ADMIN SETTINGS LOGIC FOR CALCULATOR
        // ==========================================
        function initAdminSettings() {
            if(!localStorage.getItem('tas_taxes')) {
                localStorage.setItem('tas_taxes', JSON.stringify({ gateway: 4.4, platform: 2.0, tax: 5.0, fixed: 0.30 }));
            }
        }
        initAdminSettings();

        window.openAdminUnlock = () => {
            const pass = prompt("Enter Admin Password to Edit Financial Settings:");
            if(pass === "SHAH") {
                document.getElementById('adminSettingsPanel').style.display = 'block';
                const settings = JSON.parse(localStorage.getItem('tas_taxes'));
                document.getElementById('setGateway').value = settings.gateway;
                document.getElementById('setPlatform').value = settings.platform;
                document.getElementById('setTax').value = settings.tax;
                document.getElementById('setFixed').value = settings.fixed;
            } else if (pass !== null) {
                alert("Incorrect Password. Access Denied.");
            }
        };

        window.saveAdminSettings = () => {
            const settings = {
                gateway: parseFloat(document.getElementById('setGateway').value) || 0,
                platform: parseFloat(document.getElementById('setPlatform').value) || 0,
                tax: parseFloat(document.getElementById('setTax').value) || 0,
                fixed: parseFloat(document.getElementById('setFixed').value) || 0
            };
            localStorage.setItem('tas_taxes', JSON.stringify(settings));
            document.getElementById('adminSettingsPanel').style.display = 'none';
            showToast("Admin Settings Saved Successfully");
            if(window.execROI) window.execROI(); // Recalculate if open
        };

        // ==========================================
        // TOOLS DATABASE & ALGORITHMS
        // ==========================================
        const TOOLS = {
            "AI & Text Processing": [
                {
                    id: "live_para", icon: "🧠", name: "Live AI Paraphraser", desc: "Advanced algorithm that processes sentences dynamically. Replaces academic/medical words intelligently.",
                    ui: () => `
                        <textarea id="pIn" class="form-control" style="min-height: 200px; margin-bottom:15px; font-size:16px;" placeholder="Paste original text here... (e.g., I am a dedicated Medical Laboratory Sciences student...)"></textarea>
                        <button class="btn-primary" id="btnPara" onclick="executeLiveParaphrase()">Analyze & Rewrite Content</button>
                        <div id="pLoader" class="loader"><div class="spinner"></div> System is processing and analyzing synonyms...</div>
                        
                        <div class="result-panel">
                            <h4 style="margin-bottom: 15px; font-weight:bold;">AI Output:</h4>
                            <div id="pOut">Awaiting execution...</div>
                        </div>
                    `,
                    js: () => {
                        window.executeLiveParaphrase = () => {
                            let text = document.getElementById('pIn').value;
                            if(!text.trim()) return alert("Please enter text.");
                            
                            document.getElementById('btnPara').disabled = true;
                            document.getElementById('pLoader').style.display = 'flex';
                            document.getElementById('pOut').innerText = "";

                            // Huge custom dictionary targeting their specific text and general terms
                            const liveDict = {
                                "dedicated": "committed", "student": "scholar", "currently": "presently", "final": "last",
                                "journey": "progression", "provided": "equipped", "strong": "solid", "foundation": "basis",
                                "clinical": "medical", "allowed": "enabled", "apply": "utilize", "knowledge": "expertise",
                                "real-world": "practical", "settings": "environments", "like": "such as", "passionate": "enthusiastic",
                                "about": "regarding", "technology": "innovations", "important": "crucial", "help": "assist",
                                "show": "demonstrate", "make": "generate", "look": "observe", "need": "require", "part": "component"
                            };

                            // Simulate API Network Delay for live feel
                            setTimeout(() => {
                                let processed = text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                                    let lowerWord = word.toLowerCase();
                                    if(liveDict[lowerWord]) {
                                        let replacement = liveDict[lowerWord];
                                        if(word[0] === word[0].toUpperCase()) {
                                            return replacement.charAt(0).toUpperCase() + replacement.slice(1);
                                        }
                                        return replacement;
                                    }
                                    return word;
                                });

                                document.getElementById('pLoader').style.display = 'none';
                                document.getElementById('btnPara').disabled = false;
                                document.getElementById('pOut').innerHTML = `<span style="color: var(--primary); font-weight: 500;">${processed}</span>`;
                                showToast("Text Rewritten Successfully");
                            }, 1500); // 1.5 second simulated processing time
                        }
                    }
                }
            ],
            "E-Commerce & Dropshipping": [
                {
                    id: "pro_calc", icon: "💰", name: "Pro Dropshipping Calculator", desc: "Advanced calculator with hidden admin deductions (Gateway fees, platform fees, taxes).",
                    ui: () => `
                        <div style="position: absolute; top: 20px; right: 20px;">
                            <button onclick="openAdminUnlock()" style="background:none; border:none; font-size:24px; cursor:pointer;" title="Admin Settings">⚙️</button>
                        </div>
                        
                        <div id="adminSettingsPanel" class="admin-modal">
                            <h3 style="margin-bottom:15px; color:var(--danger);">Admin Fees Settings</h3>
                            <div class="input-group"><label>Payment Gateway Fee (%)</label><input type="number" id="setGateway" class="form-control"></div>
                            <div class="input-group"><label>Fixed Gateway Fee ($)</label><input type="number" id="setFixed" class="form-control"></div>
                            <div class="input-group"><label>Platform Fee (e.g. Shopify %)</label><input type="number" id="setPlatform" class="form-control"></div>
                            <div class="input-group"><label>International Tax (%)</label><input type="number" id="setTax" class="form-control"></div>
                            <button class="btn-primary" onclick="saveAdminSettings()" style="padding:10px;">Save Settings</button>
                            <button class="btn-outline" onclick="document.getElementById('adminSettingsPanel').style.display='none'" style="width:100%; margin-top:10px; padding:10px;">Close</button>
                        </div>

                        <div class="grid-2">
                            <div class="input-group"><label>Product Cost ($)</label><input type="number" id="cBase" class="form-control" placeholder="e.g. 10"></div>
                            <div class="input-group"><label>Shipping Cost ($)</label><input type="number" id="cShip" class="form-control" placeholder="e.g. 5"></div>
                            <div class="input-group full-width">
                                <label>Target Net Profit Margin: <span id="mShow" style="color:var(--primary); font-size:18px;">30%</span></label>
                                <input type="range" id="cMar" min="5" max="80" value="30" oninput="document.getElementById('mShow').innerText=this.value+'%'">
                            </div>
                        </div>
                        <button class="btn-primary" onclick="execROI()" style="margin-top:10px;">Calculate Final Retail Price</button>
                        
                        <div id="roiRes" style="display:none; margin-top:25px;">
                            <div class="grid-2">
                                <div style="background:var(--primary-light); padding:20px; border-radius:12px; text-align:center; border:2px solid var(--primary);">
                                    <div style="font-weight:700; color:var(--primary); font-size:14px;">CUSTOMER PAYS (SELLING PRICE)</div>
                                    <div style="font-size:36px; font-weight:800; color:var(--text-dark);" id="rSell">$0.00</div>
                                </div>
                                <div style="background:#dcfce7; padding:20px; border-radius:12px; text-align:center; border:2px solid var(--success);">
                                    <div style="font-weight:700; color:var(--success); font-size:14px;">YOUR PURE PROFIT</div>
                                    <div style="font-size:36px; font-weight:800; color:var(--success);" id="rProf">$0.00</div>
                                </div>
                            </div>
                            <div style="margin-top:20px; padding:15px; background:#f1f5f9; border-radius:12px; font-size:14px;">
                                <strong>System Breakdown:</strong> Automatically deducted <span id="rTax"></span>% Tax, <span id="rPlat"></span>% Platform Fee, and <span id="rGate"></span>% Gateway Fee based on Admin Settings.
                            </div>
                        </div>
                    `,
                    js: () => {
                        window.execROI = () => {
                            let cost = parseFloat(document.getElementById('cBase').value)||0;
                            let ship = parseFloat(document.getElementById('cShip').value)||0;
                            let margin = parseFloat(document.getElementById('cMar').value)/100;
                            
                            let totalCost = cost + ship;
                            if(totalCost === 0) return alert("Please enter product cost.");

                            // Load Admin Settings
                            const s = JSON.parse(localStorage.getItem('tas_taxes'));
                            let gate = s.gateway / 100;
                            let plat = s.platform / 100;
                            let tax = s.tax / 100;
                            let fixed = s.fixed;

                            // Math Formula: Price = (Cost + Fixed Fees) / (1 - Margin - Gateway% - Platform% - Tax%)
                            let totalDeductions = margin + gate + plat + tax;
                            if(totalDeductions >= 1) return alert("Error: Total margins and fees exceed 100%. Decrease target margin.");

                            let sellPrice = (totalCost + fixed) / (1 - totalDeductions);
                            let pureProfit = sellPrice * margin;

                            document.getElementById('rSell').innerText = "$" + sellPrice.toFixed(2);
                            document.getElementById('rProf').innerText = "$" + pureProfit.toFixed(2);
                            
                            document.getElementById('rTax').innerText = s.tax;
                            document.getElementById('rPlat').innerText = s.platform;
                            document.getElementById('rGate').innerText = s.gateway;
                            
                            document.getElementById('roiRes').style.display = 'block';
                            showToast("Calculations Completed");
                        }
                    }
                }
            ]
        };

        // ==========================================
        // RENDER ENGINE
        // ==========================================
        function initApp() {
            const sb = document.getElementById('sidebar');
            let first = true;
            for(let cat in TOOLS) {
                let btn = document.createElement('button');
                btn.className = `nav-item ${first?'active':''}`;
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    renderGrid(cat);
                };
                sb.appendChild(btn);
                if(first) renderGrid(cat);
                first = false;
            }
        }

        function renderGrid(cat) {
            document.getElementById('workspace').style.display = 'none';
            const grid = document.getElementById('toolsGrid');
            grid.style.display = 'grid'; grid.innerHTML = '';
            
            TOOLS[cat].forEach(tool => {
                let card = document.createElement('div');
                card.className = 'tool-card';
                card.innerHTML = `<div class="tool-icon">${tool.icon}</div><h3>${tool.name}</h3><p>${tool.desc}</p>`;
                card.onclick = () => openTool(tool);
                grid.appendChild(card);
            });
        }

        function openTool(tool) {
            document.getElementById('toolsGrid').style.display = 'none';
            document.getElementById('workspace').style.display = 'block';
            document.getElementById('wsTitle').innerText = tool.name;
            document.getElementById('wsDesc').innerText = tool.desc;
            document.getElementById('wsBody').innerHTML = tool.ui();
            if(tool.js) tool.js();
        }

        function closeWorkspace() {
            document.getElementById('workspace').style.display = 'none';
            document.getElementById('toolsGrid').style.display = 'grid';
        }

        initApp();
    </script>
</body>
</html>
