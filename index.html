<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Lab Manual - tajamal.me</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --sidebar-bg: #1e293b;
            --sidebar-text: #f8fafc;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Sidebar Styling */
        #sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            overflow-y: auto;
            padding: 20px 0;
            transition: 0.3s;
        }

        #sidebar h2 {
            padding: 0 20px 20px 20px;
            font-size: 1.5rem;
            border-bottom: 1px solid #334155;
            margin-bottom: 10px;
        }

        .module-btn, .sub-btn, .test-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: var(--sidebar-text);
            padding: 12px 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .module-btn { font-weight: bold; font-size: 1.1rem; }
        .sub-btn { padding-left: 40px; color: #cbd5e1; border-left: 2px solid transparent; }
        .test-btn { padding-left: 60px; color: #94a3b8; font-size: 0.9rem; }

        .module-btn:hover, .sub-btn:hover, .test-btn:hover {
            background-color: #334155;
        }
        
        .active-btn {
            background-color: var(--primary);
            border-left: 4px solid #60a5fa;
            color: white;
        }

        .hidden { display: none; }

        /* Main Content Styling */
        #main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-container {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        h1 { color: var(--primary-dark); margin-bottom: 10px; }
        .breadcrumb { color: var(--text-muted); font-size: 0.9rem; }

        /* Card Styling for Data Sections */
        .data-section {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .data-section h3 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
        }

        ul, ol {
            padding-left: 20px;
            line-height: 1.6;
        }

        li { margin-bottom: 8px; }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; max-height: 40vh; }
            #main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Lab Modules</h2>
        <div id="nav-container"></div>
    </div>

    <div id="main-content">
        <div id="content-display">
            <div class="welcome-screen">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary); margin-bottom: 20px;">
                    <path d="M9 2v20M15 2v20M2 12h20M5 2a3 3 0 0 0-3 3v14a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V5a3 3 0 0 0-3-3H5z"/>
                </svg>
                <h2>Welcome to the Digital Lab Manual</h2>
                <p>Select a module from the sidebar to view SOPs, principles, and procedures.</p>
            </div>
        </div>
    </div>

    <script>
        // Data Structure holding all modules, sub-modules, and specific tests
        const labData = {
            "Microbiology": {
                "Bacteriology": {
                    "Gram Stain": {
                        purpose: "To differentiate bacterial species into two large groups (gram-positive and gram-negative) based on the physical properties of their cell walls.",
                        principle: "Gram-positive bacteria retain the primary stain (crystal violet) due to a thick peptidoglycan layer. Gram-negative bacteria lose the primary stain during decolorization and take up the counterstain (safranin) due to a thinner peptidoglycan layer and high lipid content.",
                        parameters: [
                            "Gram Reaction (Positive/Negative)",
                            "Morphology (Cocci, Bacilli, Coccobacilli)",
                            "Arrangement (Clusters, Chains, Pairs)"
                        ],
                        procedure: [
                            "Step 1: Prepare a thin smear of the sample on a clean glass slide and heat fix it.",
                            "Step 2: Flood the slide with Crystal Violet (Primary Stain) for 1 minute, then wash with water.",
                            "Step 3: Flood with Gram's Iodine (Mordant) for 1 minute, then wash with water.",
                            "Step 4: Decolorize rapidly with 95% Ethanol or Acetone for 10-15 seconds, wash immediately.",
                            "Step 5: Flood with Safranin (Counterstain) for 1 minute, wash, air dry, and observe under 100x oil immersion."
                        ],
                        normalRange: [
                            "Sterile body fluids (e.g., CSF, Blood): No microorganisms seen.",
                            "Non-sterile sites (e.g., Throat, Stool): Normal flora present."
                        ],
                        interpretation: "Purple/Blue cells indicate Gram-Positive. Pink/Red cells indicate Gram-Negative. The presence of WBCs (pus cells) indicates inflammation/infection.",
                        qa_qc: "Run known control slides weekly. Use Staphylococcus aureus as a Gram-positive control and Escherichia coli as a Gram-negative control. Check stains for precipitates."
                    }
                }
            },
            "Routine Chemistry": {
                "Liver Function Tests (LFTs)": {
                    "ALT (SGPT)": {
                        purpose: "To screen for and monitor liver damage or disease.",
                        principle: "ALT catalyzes the transfer of an amino group from alanine to alpha-ketoglutarate, forming pyruvate and glutamate. Pyruvate is then reduced by NADH in the presence of Lactate Dehydrogenase (LDH). The rate of decrease in absorbance at 340 nm is directly proportional to ALT activity.",
                        parameters: [
                            "Serum Alanine Aminotransferase (ALT)"
                        ],
                        procedure: [
                            "Step 1: Set automated analyzer parameters or water bath to 37°C.",
                            "Step 2: Take 1000 µL of working ALT Reagent in a clean test tube.",
                            "Step 3: Add 100 µL of patient Serum/Plasma (non-hemolyzed).",
                            "Step 4: Mix immediately and incubate for 1 minute.",
                            "Step 5: Read initial absorbance at 340 nm. Take subsequent readings at 1, 2, and 3 minutes to calculate the change in absorbance per minute (ΔA/min).",
                            "Step 6: Multiply ΔA/min by the kinetic factor (usually 1746) to get IU/L."
                        ],
                        normalRange: [
                            "Males: 10 - 40 IU/L",
                            "Females: 7 - 35 IU/L",
                            "Pediatric: Varies slightly by age, generally <50 IU/L"
                        ],
                        interpretation: "Marked elevations (>10x normal) suggest acute viral hepatitis or severe ischemia. Moderate elevations suggest chronic hepatitis, fatty liver, or drug toxicity.",
                        qa_qc: "Run Normal and Pathological control serums daily before testing patient samples. Ensure values fall within the ±2SD range on the Levey-Jennings chart."
                    }
                }
            },
            "Special Chemistry": {
                "Thyroid Profile": {
                    "TSH (Thyroid Stimulating Hormone)": {
                        purpose: "To evaluate thyroid function, diagnose thyroid disorders (hypo/hyperthyroidism), and monitor treatment.",
                        principle: "Based on Chemiluminescence Immunoassay (CLIA) or ELISA. A sandwich technique is used where TSH in the sample binds to a solid-phase antibody and an enzyme-labeled antibody. The resulting light emission or color change is directly proportional to TSH concentration.",
                        parameters: [
                            "Serum TSH concentration"
                        ],
                        procedure: [
                            "Step 1: Bring all assay reagents and patient serum to room temperature (20-25°C).",
                            "Step 2: Dispense 50 µL of patient serum into the microtiter well/cuvette.",
                            "Step 3: Add 100 µL of Enzyme Conjugate Reagent.",
                            "Step 4: Incubate at room temperature for 60 minutes (or as per machine specific protocol).",
                            "Step 5: Wash the wells 5 times with Wash Buffer to remove unbound material.",
                            "Step 6: Add 100 µL of Substrate/Chemiluminescent substrate. Read in analyzer."
                        ],
                        normalRange: [
                            "Adults: 0.4 - 4.0 mIU/L",
                            "Pregnancy (1st Trimester): 0.1 - 2.5 mIU/L",
                            "Neonates: Generally higher (up to 20 mIU/L in first few days)"
                        ],
                        interpretation: "High TSH indicates Primary Hypothyroidism (underactive thyroid). Low TSH indicates Primary Hyperthyroidism (overactive thyroid). Must be correlated with Free T4 levels.",
                        qa_qc: "Three levels of commercial controls (Low, Normal, High) must be run. Perform routine calibration curve verification."
                    }
                }
            },
            "Hematology": {
                "Routine Hematology": {
                    "Complete Blood Count (CBC)": {
                        purpose: "To evaluate overall health and detect a wide range of disorders, including anemia, infection, and leukemia.",
                        principle: "Automated analyzers use Electrical Impedance (Coulter Principle) for cell counting and sizing, and Flow Cytometry/Laser Light Scattering for WBC differentiation. Hemoglobin is measured photometrically using the Cyanmethemoglobin or SLS-Hb method.",
                        parameters: [
                            "Red Blood Cell Count (RBC)",
                            "Hemoglobin (Hb)",
                            "Hematocrit (Hct / PCV)",
                            "Mean Corpuscular Volume (MCV)",
                            "White Blood Cell Count (WBC / TLC)",
                            "Differential Leukocyte Count (Neutrophils, Lymphocytes, etc.)",
                            "Platelet Count (PLT)"
                        ],
                        procedure: [
                            "Step 1: Collect 2-3 ml of venous blood in an EDTA (Purple top) tube.",
                            "Step 2: Gently invert the tube 8-10 times to ensure proper mixing and prevent micro-clots.",
                            "Step 3: Check the sample for any visible clots using wooden applicator sticks if necessary.",
                            "Step 4: Feed the barcode or manually enter the patient ID into the 3-part or 5-part hematology analyzer.",
                            "Step 5: Aspirate the whole blood sample into the machine probe.",
                            "Step 6: Review the generated results and histograms. If flags are present, prepare a peripheral blood smear for manual microscopy."
                        ],
                        normalRange: [
                            "Hb: Male 13.8 - 17.2 g/dL | Female 12.1 - 15.1 g/dL",
                            "WBC: 4,500 - 11,000 cells/mcL",
                            "Platelets: 150,000 - 450,000 /mcL",
                            "MCV: 80 - 100 fL"
                        ],
                        interpretation: "Low Hb/RBC indicates Anemia. High WBC indicates infection, inflammation, or leukemia. Low platelets (Thrombocytopenia) indicate bleeding risk.",
                        qa_qc: "Run commercial Tri-level controls (Low, Normal, High) daily. Monitor moving averages of patient indices (MCV, MCH, MCHC) using Bull's algorithm."
                    }
                }
            }
        };

        // UI Generation Logic
        const navContainer = document.getElementById('nav-container');
        const contentDisplay = document.getElementById('content-display');

        // Function to render the navigation menu
        function renderNav() {
            for (const [moduleName, subModules] of Object.entries(labData)) {
                // Create Module Button
                const modBtn = document.createElement('button');
                modBtn.className = 'module-btn';
                modBtn.textContent = `▶ ${moduleName}`;
                
                const subContainer = document.createElement('div');
                subContainer.className = 'hidden';

                modBtn.onclick = () => {
                    subContainer.classList.toggle('hidden');
                    modBtn.textContent = subContainer.classList.contains('hidden') ? `▶ ${moduleName}` : `▼ ${moduleName}`;
                };

                // Create Sub-modules
                for (const [subModuleName, tests] of Object.entries(subModules)) {
                    const subBtn = document.createElement('button');
                    subBtn.className = 'sub-btn';
                    subBtn.textContent = `▶ ${subModuleName}`;
                    
                    const testContainer = document.createElement('div');
                    testContainer.className = 'hidden';

                    subBtn.onclick = () => {
                        testContainer.classList.toggle('hidden');
                        subBtn.textContent = testContainer.classList.contains('hidden') ? `▶ ${subModuleName}` : `▼ ${subModuleName}`;
                    };

                    // Create Tests
                    for (const [testName, testData] of Object.entries(tests)) {
                        const testBtn = document.createElement('button');
                        testBtn.className = 'test-btn';
                        testBtn.textContent = testName;
                        
                        testBtn.onclick = () => {
                            // Remove active class from all, add to current
                            document.querySelectorAll('.test-btn').forEach(btn => btn.classList.remove('active-btn'));
                            testBtn.classList.add('active-btn');
                            displayContent(moduleName, subModuleName, testName, testData);
                        };

                        testContainer.appendChild(testBtn);
                    }

                    subContainer.appendChild(subBtn);
                    subContainer.appendChild(testContainer);
                }

                navContainer.appendChild(modBtn);
                navContainer.appendChild(subContainer);
            }
        }

        // Function to generate lists from arrays
        function generateList(dataArray, isOrdered = false) {
            if (!dataArray || dataArray.length === 0) return "<p>Data not available.</p>";
            const listType = isOrdered ? 'ol' : 'ul';
            let listHTML = `<${listType}>`;
            dataArray.forEach(item => {
                listHTML += `<li>${item}</li>`;
            });
            listHTML += `</${listType}>`;
            return listHTML;
        }

        // Function to display the selected test content
        function displayContent(mod, sub, test, data) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            contentDisplay.innerHTML = `
                <div class="header-container">
                    <div class="breadcrumb">${mod} / ${sub}</div>
                    <h1>${test}</h1>
                </div>

                <div class="data-section">
                    <h3>🎯 Purpose</h3>
                    <p>${data.purpose}</p>
                </div>

                <div class="data-section">
                    <h3>🔬 Principle</h3>
                    <p>${data.principle}</p>
                </div>

                <div class="data-section">
                    <h3>🧪 Parameters Analyzed</h3>
                    ${generateList(data.parameters)}
                </div>

                <div class="data-section">
                    <h3>📝 Step-by-Step Procedure (with Quantities)</h3>
                    ${generateList(data.procedure, false)} </div>

                <div class="data-section">
                    <h3>📊 Normal Reference Ranges</h3>
                    ${generateList(data.normalRange)}
                </div>

                <div class="data-section">
                    <h3>⚕️ Result Interpretation</h3>
                    <p>${data.interpretation}</p>
                </div>

                <div class="data-section">
                    <h3>✅ Quality Control & Assurance (QA/QC)</h3>
                    <p>${data.qa_qc}</p>
                </div>
            `;
        }

        // Initialize App
        renderNav();
    </script>
</body>
</html>
