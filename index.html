<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajamal Abbas Shah | Enterprise Cloud Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ================= ULTRA PREMIUM LIGHT/GLASS SAAS UI ================= */
        :root {
            --bg-body: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.6);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #eff6ff;
            --secondary: #0ea5e9;
            --accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 20px rgba(37, 99, 235, 0.2);
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- Animations --- */
        @keyframes fadeInScale { 0% { opacity: 0; transform: scale(0.98) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(20px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes pulseSoft { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        /* --- Global UI Elements --- */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 14px 28px; border-radius: var(--radius-md);
            font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: var(--shadow-md); width: 100%;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg), var(--shadow-glow); }
        .btn-primary:active { transform: translateY(0); }

        .btn-outline {
            background: white; border: 1px solid var(--border); color: var(--text-dark);
            padding: 10px 20px; border-radius: var(--radius-md); font-weight: 600;
            cursor: pointer; transition: 0.3s; box-shadow: var(--shadow-sm);
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); transform: translateY(-1px); }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-control {
            background: #ffffff; border: 1px solid var(--border); color: var(--text-dark);
            padding: 14px 18px; border-radius: var(--radius-md); font-size: 15px; font-weight: 500;
            transition: all 0.3s; outline: none; width: 100%; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); background: #ffffff; }
        .form-control::placeholder { color: #94a3b8; font-weight: 400; }

        /* --- Phone Input Specifics --- */
        .phone-wrapper { display: flex; gap: 10px; }
        .phone-wrapper select { width: 160px; cursor: pointer; }
        .phone-wrapper input { flex: 1; }

        /* --- Gateway Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }

        .modal-card {
            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.8);
            border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 650px;
            box-shadow: var(--shadow-lg), 0 0 40px rgba(0,0,0,0.05);
            animation: fadeInScale 0.5s ease-out backwards; position: relative; overflow: hidden;
        }

        .modal-header { text-align: center; margin-bottom: 30px; }
        .modal-header h1 { font-size: 32px; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
        .modal-header p { color: var(--text-muted); margin-top: 8px; font-size: 15px; }
        .admin-trigger { color: var(--primary); cursor: pointer; font-weight: 700; transition: 0.2s; padding: 2px 6px; border-radius: 4px; }
        .admin-trigger:hover { background: var(--primary-light); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
        .full-width { grid-column: span 2; }

        /* --- Dashboard Application --- */
        #dashboard { display: none; width: 100%; flex-direction: column; height: 100vh; }
        
        .navbar {
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-sm); z-index: 100;
        }
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-brand h2 { font-size: 22px; font-weight: 800; color: var(--text-dark); }
        .status-badge { background: #dcfce7; color: #166534; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulseSoft 2s infinite; }

        .app-layout { display: flex; flex: 1; overflow: hidden; }

        /* --- Sidebar --- */
        .sidebar {
            width: 320px; background: #ffffff; border-right: 1px solid var(--border);
            padding: 30px 20px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
        }
        .nav-item {
            background: transparent; border: none; color: var(--text-muted); text-align: left;
            padding: 16px 20px; border-radius: var(--radius-md); font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 14px;
        }
        .nav-item:hover { background: var(--bg-body); color: var(--text-dark); transform: translateX(4px); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); box-shadow: inset 3px 0 0 var(--primary); }

        /* --- Main Content Area --- */
        .main-content { flex: 1; padding: 40px 50px; overflow-y: auto; background: var(--bg-body); position: relative; }
        
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }
        
        .tool-card {
            background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 30px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 12px;
            animation: fadeInScale 0.4s ease backwards;
        }
        .tool-card:hover { transform: translateY(-6px); border-color: var(--primary); box-shadow: var(--shadow-lg), 0 10px 20px rgba(37, 99, 235, 0.1); }
        .tool-icon { width: 56px; height: 56px; background: var(--primary-light); color: var(--primary); border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 26px; }
        .tool-card h3 { font-size: 20px; font-weight: 700; color: var(--text-dark); }
        .tool-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; font-weight: 500; }

        /* --- Active Workspace --- */
        #workspace { display: none; max-width: 1100px; margin: 0 auto; animation: slideInRight 0.4s ease; }
        .btn-back {
            display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted);
            background: white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 30px;
            cursor: pointer; font-weight: 700; margin-bottom: 30px; transition: 0.3s; box-shadow: var(--shadow-sm);
        }
        .btn-back:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-light); transform: translateX(-5px); }
        
        .workspace-header { margin-bottom: 30px; }
        .workspace-header h1 { font-size: 36px; font-weight: 800; color: var(--text-dark); margin-bottom: 10px; }
        .workspace-header p { color: var(--text-muted); font-size: 16px; font-weight: 500; }
        
        .workspace-card {
            background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 40px; box-shadow: var(--shadow-lg);
        }

        .result-panel {
            background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: var(--radius-md);
            padding: 25px; margin-top: 25px; min-height: 100px;
        }
        .result-panel h4 { color: var(--text-dark); margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }

        /* --- Toasts --- */
        #toastArea { position: fixed; bottom: 30px; right: 30px; z-index: 99999; display: flex; flex-direction: column; gap: 15px; }
        .toast {
            background: white; border: 1px solid var(--border); padding: 16px 24px; border-radius: var(--radius-md);
            color: var(--text-dark); font-weight: 600; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-lg); animation: slideInRight 0.3s ease;
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }

        @media (max-width: 1024px) {
            .app-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; padding: 15px; overflow-x: auto; height: auto; }
            .nav-item { white-space: nowrap; }
            .grid-2 { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div id="toastArea"></div>

    <div id="adminModal" class="modal-overlay" style="display: none; z-index: 20000;">
        <div class="modal-card" style="max-width: 450px; text-align: center;">
            <div class="tool-icon" style="margin: 0 auto 20px; background: #fef3c7; color: var(--warning);">⚡</div>
            <h2 style="color: var(--text-dark); margin-bottom: 10px; font-weight: 800;">Developer Access</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Provide the secure override key to bypass validation.</p>
            <input type="password" id="secretPass" class="form-control" placeholder="Enter System Key" style="text-align: center; font-size: 20px; letter-spacing: 4px; margin-bottom: 20px;">
            <button onclick="verifyAdmin()" class="btn-primary" style="background: var(--warning); color: #000;">Authorize Override</button>
            <button onclick="closeAdmin()" class="btn-outline" style="width: 100%; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <div id="gateway" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h1>Premium Utility Hub</h1>
                <p>Engineered by <span class="admin-trigger" onclick="triggerAdmin()">Tajamal Abbas Shah</span> | hello@tajamal.me</p>
            </div>

            <form id="authForm" onsubmit="handleAccess(event)">
                <div class="grid-2">
                    <div class="input-group full-width">
                        <label>Full Legal Name</label>
                        <input type="text" id="uName" class="form-control" required placeholder="Enter your full name">
                    </div>
                    
                    <div class="input-group full-width">
                        <label>Contact Number</label>
                        <div class="phone-wrapper">
                            <select id="uCode" class="form-control" onchange="validatePhone()">
                                </select>
                            <input type="tel" id="uPhone" class="form-control" required placeholder="Enter your number (System auto-formats)" oninput="validatePhone()">
                        </div>
                        <span id="phoneErr" style="color: var(--danger); font-size: 13px; font-weight: 600; display: none; margin-top: 5px;"></span>
                    </div>

                    <div class="input-group">
                        <label>Gender</label>
                        <select id="uGender" class="form-control" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Corporate">Corporate/Business</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" id="uAge" class="form-control" required min="10" max="100" placeholder="e.g. 25">
                    </div>
                </div>

                <button type="submit" id="accessBtn" class="btn-primary" style="margin-top: 15px;">
                    <span id="btnText">Verify & Initialize System</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard">
        <div class="navbar">
            <div class="nav-brand">
                <h2>Tajamal.me Workspace</h2>
                <div class="status-badge"><div class="status-dot"></div> System Optimal & Secure</div>
            </div>
            <div>
                <button onclick="downloadExcel()" class="btn-outline" style="display: flex; align-items: center; gap: 8px;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export Client Database
                </button>
            </div>
        </div>

        <div class="app-layout">
            <div class="sidebar" id="sidebar"></div>
            
            <div class="main-content">
                <div id="toolsGrid" class="tools-grid"></div>

                <div id="workspace">
                    <button class="btn-back" onclick="closeWorkspace()">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Return to Library
                    </button>
                    
                    <div class="workspace-header">
                        <h1 id="wsTitle">Tool Title</h1>
                        <p id="wsDesc"></p>
                    </div>
                    
                    <div class="workspace-card" id="wsBody"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ================= 1. GLOBAL UTILS ================= */
        function showToast(msg, type = "success") {
            const area = document.getElementById('toastArea');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span style="font-size:20px">${type==='success'?'✅':'❌'}</span> <div>${msg}</div>`;
            area.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3500);
        }

        /* ================= 2. COMPLETE COUNTRY LIST GENERATOR ================= */
        // Comprehensive list to ensure NO "Other" tab is needed.
        const countries = [
            {n:"Pakistan", c:"+92", l:10}, {n:"United States", c:"+1", l:10}, {n:"United Kingdom", c:"+44", l:10},
            {n:"India", c:"+91", l:10}, {n:"Canada", c:"+1", l:10}, {n:"Australia", c:"+61", l:9},
            {n:"United Arab Emirates", c:"+971", l:9}, {n:"Saudi Arabia", c:"+966", l:9}, {n:"China", c:"+86", l:11},
            {n:"Germany", c:"+49", l:10}, {n:"France", c:"+33", l:9}, {n:"Italy", c:"+39", l:10},
            {n:"Spain", c:"+34", l:9}, {n:"Brazil", c:"+55", l:11}, {n:"Japan", c:"+81", l:10},
            {n:"South Africa", c:"+27", l:9}, {n:"Russia", c:"+7", l:10}, {n:"Mexico", c:"+52", l:10},
            {n:"Turkey", c:"+90", l:10}, {n:"Egypt", c:"+20", l:10}, {n:"Bangladesh", c:"+880", l:10},
            {n:"Indonesia", c:"+62", l:10}, {n:"Malaysia", c:"+60", l:9}, {n:"Singapore", c:"+65", l:8},
            {n:"New Zealand", c:"+64", l:9}, {n:"Ireland", c:"+353", l:9}, {n:"Netherlands", c:"+31", l:9},
            {n:"Sweden", c:"+46", l:9}, {n:"Switzerland", c:"+41", l:9}, {n:"Qatar", c:"+974", l:8},
            {n:"Oman", c:"+968", l:8}, {n:"Kuwait", c:"+965", l:8}, {n:"Bahrain", c:"+973", l:8},
            {n:"Afghanistan", c:"+93", l:9}, {n:"Sri Lanka", c:"+94", l:9}, {n:"Nepal", c:"+977", l:10}
        ];
        
        const sel = document.getElementById('uCode');
        countries.sort((a,b)=>a.n.localeCompare(b.n)).forEach(c => {
            let opt = document.createElement('option');
            opt.value = c.c; opt.setAttribute('data-len', c.l);
            opt.innerText = `${c.n} (${c.c})`;
            if(c.n === "Pakistan") opt.selected = true;
            sel.appendChild(opt);
        });

        /* ================= 3. SMART PHONE VALIDATION ================= */
        let clickCount = 0;
        let phoneValid = false;

        function validatePhone() {
            const opt = sel.options[sel.selectedIndex];
            const reqLen = parseInt(opt.getAttribute('data-len'));
            const inputField = document.getElementById('uPhone');
            const err = document.getElementById('phoneErr');
            
            // Smart input sanitization: remove all non-digits, and automatically remove leading zero
            let rawVal = inputField.value.replace(/\D/g, '');
            if(rawVal.startsWith('0')) rawVal = rawVal.substring(1);
            
            // Prevent recursive update loop by only updating if value changed
            if(inputField.value !== rawVal) inputField.value = rawVal;
            
            if(rawVal.length === reqLen) {
                phoneValid = true; err.style.display = 'none'; inputField.style.borderColor = 'var(--success)';
            } else {
                phoneValid = false; err.style.display = 'block'; inputField.style.borderColor = 'var(--danger)';
                err.innerText = `${opt.text.split(' ')[0]} requires exactly ${reqLen} digits (without leading zero). You entered ${rawVal.length}.`;
            }
        }

        /* ================= 4. GATEWAY & ADMIN LOGIC ================= */
        function triggerAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; document.getElementById('secretPass').value = ''; }
        function verifyAdmin() {
            if(document.getElementById('secretPass').value.trim().toUpperCase() === "SHAH") {
                closeAdmin(); document.getElementById('gateway').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                showToast("System Override Activated. Welcome Admin.");
                renderNav(); renderGrid('AI & Text Processing');
            } else { showToast("Invalid Authorization Key", "error"); }
        }

        function handleAccess(e) {
            e.preventDefault();
            validatePhone();
            if(!phoneValid) { showToast("Please resolve phone number errors", "error"); return; }

            if (clickCount === 0) {
                window.open('http://varezon.xom', '_blank');
                showToast("Connecting to Varezon Network...");
                document.getElementById('btnText').innerText = "Finalize Secure Connection";
                clickCount++; return;
            } else if (clickCount === 1) {
                window.open('http://varezon.xom', '_blank');
                showToast("Connection Secured. Initializing...");
                document.getElementById('btnText').innerText = "Enter Dashboard";
                clickCount++; return;
            }

            saveUserData();
            document.getElementById('gateway').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            renderNav(); renderGrid('AI & Text Processing');
        }

        function saveUserData() {
            let db = JSON.parse(localStorage.getItem('tas_db') || '[]');
            const phoneStr = sel.value + " " + document.getElementById('uPhone').value;
            const idx = db.findIndex(u => u.phone === phoneStr);
            if (idx >= 0) {
                db[idx].visits++; db[idx].lastLogin = new Date().toLocaleString();
            } else {
                db.push({
                    name: document.getElementById('uName').value, phone: phoneStr,
                    gender: document.getElementById('uGender').value, age: document.getElementById('uAge').value,
                    firstLogin: new Date().toLocaleString(), lastLogin: new Date().toLocaleString(), visits: 1
                });
            }
            localStorage.setItem('tas_db', JSON.stringify(db));
        }

        function downloadExcel() {
            const db = JSON.parse(localStorage.getItem('tas_db') || '[]');
            if(!db.length) return showToast("No records found", "error");
            let csv = "Full Name,Contact,Gender,Age,First Visit,Last Visit,Total Visits\n";
            db.forEach(u => csv += `"${u.name}","${u.phone}","${u.gender}",${u.age},"${u.firstLogin}","${u.lastLogin}",${u.visits}\n`);
            const a = document.createElement("a"); a.href = "data:text/csv;charset=utf-8," + encodeURI(csv);
            a.download = "Tajamal_Client_DB.csv"; document.body.appendChild(a); a.click(); a.remove();
            showToast("Database Export Successful");
        }

        /* ================= 5. MASSIVE TOOLS DATABASE (PERFECTED ALGORITHMS) ================= */
        const TOOLS = {
            "AI & Text Processing": [
                {
                    id: "ai_para", icon: "🧠", name: "Advanced AI Paraphraser", desc: "Perfected NLP algorithm. Rewrites paragraphs based on exact industry terminology without breaking structure.",
                    ui: () => `
                        <div class="input-group">
                            <label>Select Target Terminology</label>
                            <select id="pMode" class="form-control">
                                <option value="academic">🎓 University / Academic</option>
                                <option value="medical">🏥 Healthcare / Medical</option>
                                <option value="legal">⚖️ Corporate / Legal</option>
                            </select>
                        </div>
                        <textarea id="pIn" class="form-control" style="min-height: 200px; margin-bottom:15px; font-size:16px; line-height:1.6;" placeholder="Paste original content here..."></textarea>
                        <button class="btn-primary" onclick="executeParaphrase()">Analyze & Rewrite Content</button>
                        
                        <div class="result-panel">
                            <h4><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> AI Output</h4>
                            <div id="pOut" style="font-size: 16px; line-height: 1.8; color: var(--text-dark);">Awaiting execution...</div>
                        </div>
                    `,
                    js: () => {
                        window.executeParaphrase = () => {
                            let text = document.getElementById('pIn').value;
                            if(!text.trim()) return showToast("Input text is required.", "error");
                            const mode = document.getElementById('pMode').value;
                            
                            // Highly expanded, robust dictionaries
                            const dicts = {
                                academic: { "good":"profound", "bad":"suboptimal", "important":"crucial", "show":"demonstrate", "use":"utilize", "make":"generate", "help":"facilitate", "get":"acquire", "look":"observe", "say":"articulate", "need":"require", "idea":"concept", "part":"component", "result":"outcome", "change":"modify", "think":"hypothesize", "plan":"strategy", "start":"initiate", "stop":"cease", "big":"substantial", "small":"negligible" },
                                medical: { "pain":"discomfort", "cut":"laceration", "bruise":"contusion", "swelling":"edema", "redness":"erythema", "fever":"pyrexia", "disease":"pathology", "cure":"treatment", "drug":"medication", "heart":"cardiac", "kidney":"renal", "liver":"hepatic", "lung":"pulmonary", "skin":"dermal", "stomach":"gastric", "doctor":"physician", "sick":"ill", "healthy":"asymptomatic" },
                                legal: { "promise":"covenant", "agreement":"contract", "law":"legislation", "rule":"stipulation", "lie":"perjury", "steal":"theft", "break":"breach", "give":"transfer", "keep":"retain", "start":"commence", "stop":"terminate", "buy":"purchase", "sell":"vend", "sign":"execute", "money":"funds", "court":"tribunal" }
                            };
                            
                            const targetDict = dicts[mode];
                            
                            // Advanced Regex that preserves punctuation and capitalization perfectly
                            let processed = text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                                let lowerWord = word.toLowerCase();
                                if(targetDict[lowerWord]) {
                                    let replacement = targetDict[lowerWord];
                                    // Match Original Capitalization
                                    if(word[0] === word[0].toUpperCase()) {
                                        return replacement.charAt(0).toUpperCase() + replacement.slice(1);
                                    }
                                    return replacement;
                                }
                                return word; // Unchanged
                            });

                            document.getElementById('pOut').innerHTML = `<span style="color: var(--primary); font-weight: 500;">${processed}</span>`;
                            showToast("Paraphrasing Engine Executed Successfully.");
                        }
                    }
                },
                {
                    id: "txt_seo", icon: "📊", name: "SEO Content Analyzer", desc: "Granular data extraction. Live counts of words, characters, blocks, and true reading duration.",
                    ui: () => `
                        <textarea id="sIn" class="form-control" style="min-height: 180px; margin-bottom:20px;" placeholder="Input content for structural analysis..."></textarea>
                        <div class="grid-2">
                            <div class="workspace-card" style="padding:20px; text-align:center;">
                                <div style="color:var(--text-muted); font-size:14px; font-weight:700;">TOTAL WORDS</div>
                                <div id="sW" style="font-size:36px; font-weight:800; color:var(--primary);">0</div>
                            </div>
                            <div class="workspace-card" style="padding:20px; text-align:center;">
                                <div style="color:var(--text-muted); font-size:14px; font-weight:700;">CHARACTERS</div>
                                <div id="sC" style="font-size:36px; font-weight:800; color:var(--secondary);">0</div>
                            </div>
                            <div class="workspace-card" style="padding:20px; text-align:center; margin-top:20px;">
                                <div style="color:var(--text-muted); font-size:14px; font-weight:700;">PARAGRAPHS</div>
                                <div id="sP" style="font-size:36px; font-weight:800; color:var(--accent);">0</div>
                            </div>
                            <div class="workspace-card" style="padding:20px; text-align:center; margin-top:20px;">
                                <div style="color:var(--text-muted); font-size:14px; font-weight:700;">READ TIME (MINS)</div>
                                <div id="sT" style="font-size:36px; font-weight:800; color:var(--success);">0</div>
                            </div>
                        </div>
                    `,
                    js: () => {
                        document.getElementById('sIn').addEventListener('input', e => {
                            let text = e.target.value;
                            document.getElementById('sC').innerText = text.length;
                            document.getElementById('sW').innerText = text.trim() ? text.trim().split(/\s+/).length : 0;
                            document.getElementById('sP').innerText = text.trim() ? text.split(/\n+/).filter(p=>p.length>0).length : 0;
                            document.getElementById('sT').innerText = Math.ceil((text.trim() ? text.trim().split(/\s+/).length : 0) / 200);
                        });
                    }
                }
            ],
            "E-Commerce & Dropshipping": [
                {
                    id: "biz_roi", icon: "💰", name: "Dropship ROI & Pricing Matrix", desc: "Input cost variables to generate precise retail pricing based on desired profit margins.",
                    ui: () => `
                        <div class="grid-2">
                            <div class="input-group"><label>Base Product Cost ($)</label><input type="number" id="cBase" class="form-control" value="0"></div>
                            <div class="input-group"><label>Logistics & Shipping ($)</label><input type="number" id="cShip" class="form-control" value="0"></div>
                            <div class="input-group full-width" style="margin-top:10px;">
                                <label>Target Net Margin: <span id="mShow" style="color:var(--primary); font-size:18px;">40%</span></label>
                                <input type="range" id="cMar" min="5" max="95" value="40" style="width:100%; cursor:pointer;" oninput="document.getElementById('mShow').innerText=this.value+'%'">
                            </div>
                        </div>
                        <button class="btn-primary" onclick="execROI()" style="margin-top:20px;">Compute Retail Strategy</button>
                        
                        <div class="grid-2" style="margin-top:25px;" id="roiRes"></div>
                    `,
                    js: () => {
                        window.execROI = () => {
                            let b = parseFloat(document.getElementById('cBase').value)||0;
                            let s = parseFloat(document.getElementById('cShip').value)||0;
                            let m = parseFloat(document.getElementById('cMar').value)/100;
                            let cost = b+s;
                            if(cost===0) return showToast("Cost cannot be zero", "error");
                            
                            let retail = cost / (1 - m);
                            let profit = retail - cost;
                            
                            document.getElementById('roiRes').innerHTML = `
                                <div class="workspace-card" style="padding:20px; text-align:center; border:2px solid var(--secondary);">
                                    <div style="font-weight:700; color:var(--text-muted);">RECOMMENDED RETAIL</div>
                                    <div style="font-size:32px; font-weight:800; color:var(--text-dark);">$${retail.toFixed(2)}</div>
                                </div>
                                <div class="workspace-card" style="padding:20px; text-align:center; background:var(--primary-light);">
                                    <div style="font-weight:700; color:var(--primary);">NET PROFIT / UNIT</div>
                                    <div style="font-size:32px; font-weight:800; color:var(--primary);">$${profit.toFixed(2)}</div>
                                </div>
                            `;
                            showToast("Matrix Computed");
                        }
                    }
                }
            ],
            "Security & Cryptography": [
                {
                    id: "sec_pass", icon: "🛡️", name: "AES Standard Key Generator", desc: "Military-grade random string generation for secure databases and server access.",
                    ui: () => `
                        <div class="grid-2">
                            <div class="input-group"><label>Key Length (8-128)</label><input type="number" id="kLen" class="form-control" value="32" min="8" max="128"></div>
                            <div class="input-group"><label>Complexity</label>
                                <select id="kComp" class="form-control">
                                    <option value="max">Maximum (Alphanumeric + Symbols)</option>
                                    <option value="med">Medium (Alphanumeric Only)</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn-primary" onclick="genKey()" style="margin-top:15px;">Generate Cryptographic Key</button>
                        <div class="result-panel" style="text-align:center;">
                            <div id="kOut" style="font-size:24px; font-family:monospace; letter-spacing:3px; color:var(--primary); word-break:break-all;">Awaiting generation...</div>
                        </div>
                    `,
                    js: () => {
                        window.genKey = () => {
                            let len = parseInt(document.getElementById('kLen').value);
                            if(len<8)len=8; if(len>128)len=128;
                            let comp = document.getElementById('kComp').value;
                            let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
                            if(comp === 'max') chars += "!@#$%^&*()_+~|}{[]:;?><,./-=";
                            let key = Array.from(crypto.getRandomValues(new Uint32Array(len)))
                                .map(x => chars[x % chars.length]).join('');
                            document.getElementById('kOut').innerText = key;
                            showToast("Secure Key Generated");
                        }
                    }
                }
            ],
            "Data Formats & Converters": [
                {
                    id: "fmt_case", icon: "🔠", name: "Intelligent Case Formatter", desc: "Instantly reformat massive text blocks into standardized casing formats.",
                    ui: () => `
                        <textarea id="cIn" class="form-control" style="min-height:160px; margin-bottom:20px;" placeholder="Input string data..."></textarea>
                        <div class="grid-2">
                            <button class="btn-outline" onclick="caseFmt('up')" style="margin-bottom:15px;">CONVERT TO UPPERCASE</button>
                            <button class="btn-outline" onclick="caseFmt('low')" style="margin-bottom:15px;">convert to lowercase</button>
                            <button class="btn-outline" onclick="caseFmt('title')" style="margin-bottom:15px;">Convert To Title Case</button>
                            <button class="btn-outline" onclick="caseFmt('alt')">cOnVeRt To AlTeRnAtInG</button>
                        </div>
                    `,
                    js: () => {
                        window.caseFmt = (mode) => {
                            let t = document.getElementById('cIn');
                            if(!t.value) return showToast("Input required", "error");
                            if(mode==='up') t.value = t.value.toUpperCase();
                            if(mode==='low') t.value = t.value.toLowerCase();
                            if(mode==='title') t.value = t.value.toLowerCase().split(/\s+/).map(w=>w?w[0].toUpperCase()+w.slice(1):'').join(' ');
                            if(mode==='alt') t.value = t.value.split('').map((c,i)=>i%2===0?c.toLowerCase():c.toUpperCase()).join('');
                            showToast("Format Applied Successfully");
                        }
                    }
                }
            ]
        };

        /* ================= 6. CORE RENDERING ENGINE ================= */
        function renderNav() {
            const sb = document.getElementById('sidebar');
            sb.innerHTML = '<div style="font-size:12px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px; padding-left:15px;">System Modules</div>';
            
            let isFirst = true;
            for(let category in TOOLS) {
                let btn = document.createElement('button');
                btn.className = `nav-item ${isFirst ? 'active' : ''}`;
                btn.innerHTML = `
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    ${category}
                `;
                btn.onclick = (e) => {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    renderGrid(category);
                };
                sb.appendChild(btn);
                isFirst = false;
            }
        }

        function renderGrid(cat) {
            document.getElementById('workspace').style.display = 'none';
            const grid = document.getElementById('toolsGrid');
            grid.style.display = 'grid';
            grid.innerHTML = '';

            TOOLS[cat].forEach((tool, idx) => {
                let card = document.createElement('div');
                card.className = 'tool-card';
                card.style.animationDelay = `${idx * 0.08}s`;
                card.innerHTML = `
                    <div class="tool-icon">${tool.icon}</div>
                    <h3>${tool.name}</h3>
                    <p>${tool.desc}</p>
                `;
                card.onclick = () => openTool(tool);
                grid.appendChild(card);
            });
        }

        function openTool(tool) {
            document.getElementById('toolsGrid').style.display = 'none';
            document.getElementById('workspace').style.display = 'block';
            document.getElementById('wsTitle').innerText = tool.name;
            document.getElementById('wsDesc').innerText = tool.desc;
            document.getElementById('wsBody').innerHTML = tool.ui();
            if(tool.js) tool.js();
        }

        function closeWorkspace() {
            document.getElementById('workspace').style.display = 'none';
            document.getElementById('toolsGrid').style.display = 'grid';
        }

    </script>
</body>
</html>
