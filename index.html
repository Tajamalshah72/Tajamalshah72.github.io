<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajamal Abbas Shah | Kazmi Labs</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #020204; 
            color: #fff; 
            min-height: 100vh; 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px;
        }

        /* Interactive Canvas Background */
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        
        /* Neon Glowing Orbs */
        .orb { position: fixed; filter: blur(100px); z-index: -1; animation: drift 15s infinite alternate linear; opacity: 0.6; }
        .orb1 { width: 400px; height: 400px; background: #00f0ff; top: -10%; left: -10%; }
        .orb2 { width: 500px; height: 500px; background: #ff003c; bottom: -20%; right: -10%; animation-delay: -5s; }
        .orb3 { width: 300px; height: 300px; background: #7000ff; top: 30%; left: 30%; animation-duration: 20s; }
        
        @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 100px) scale(1.3); } }

        /* Main Glass Container */
        .glass-card {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 35px;
            padding: 45px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
            animation: popIn 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        
        @keyframes popIn { to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Cyberpunk Avatar */
        .avatar-container { position: relative; width: 130px; height: 130px; margin: 0 auto 25px; }
        .avatar-container::before, .avatar-container::after {
            content: ''; position: absolute; inset: -8px; border-radius: 50%;
            background: conic-gradient(from 0deg, #00f0ff, #ff003c, #7000ff, #00f0ff);
            z-index: -1; animation: spin 4s linear infinite;
        }
        .avatar-container::after { filter: blur(20px); opacity: 0.7; }
        .avatar { width: 100%; height: 100%; background: #0a0a0c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid #000; color: #fff; box-shadow: inset 0 0 20px rgba(0,240,255,0.3); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Typography */
        h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; background: linear-gradient(90deg, #fff, #00f0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0,240,255,0.3); }
        h2 { font-size: 13px; font-weight: 400; color: #a0a0b0; margin-bottom: 35px; letter-spacing: 3px; text-transform: uppercase; }

        /* Next-Gen Links */
        .links { display: flex; flex-direction: column; gap: 18px; margin-bottom: 35px; }
        .link-btn {
            display: flex; align-items: center; padding: 16px 22px; border-radius: 20px;
            text-decoration: none; color: #fff; font-weight: 600; font-size: 15px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative; overflow: hidden; transition: all 0.4s ease;
        }
        .link-btn i { font-size: 22px; width: 45px; text-align: left; z-index: 2; transition: all 0.4s ease; }
        .link-btn span { z-index: 2; text-align: left; flex-grow: 1; letter-spacing: 0.5px; }
        
        .link-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: all 0.5s ease; z-index: 1; }
        .link-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 25px rgba(0,0,0,0.5); }
        .link-btn:hover::before { left: 100%; }
        .link-btn:hover i { transform: scale(1.2) rotate(5deg); }

        .amazon:hover { background: linear-gradient(135deg, #FF9900, #FFB84D); color: #000; border-color: transparent; box-shadow: 0 10px 20px rgba(255, 153, 0, 0.4); }
        .aliexpress:hover { background: linear-gradient(135deg, #E62E04, #FF5B36); border-color: transparent; box-shadow: 0 10px 20px rgba(230, 46, 4, 0.4); }
        .daraz:hover { background: linear-gradient(135deg, #F36F21, #FF9454); border-color: transparent; box-shadow: 0 10px 20px rgba(243, 111, 33, 0.4); }
        .whatsapp { border-color: rgba(37, 211, 102, 0.3); }
        .whatsapp:hover { background: linear-gradient(135deg, #25D366, #128C7E); border-color: transparent; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4); }

        /* Social Icons */
        .socials { display: flex; justify-content: center; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; text-decoration: none; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); position: relative; overflow: hidden; }
        .social-btn:hover { transform: translateY(-8px) scale(1.1); color: #fff; }
        .social-btn.tw:hover { background: #000; border-color: #555; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .social-btn.ig:hover { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border-color: transparent; box-shadow: 0 10px 20px rgba(220, 39, 67, 0.4); }
        .social-btn.li:hover { background: #0077b5; border-color: #0077b5; box-shadow: 0 10px 20px rgba(0, 119, 181, 0.4); }
        .social-btn.yt:hover { background: #ff0000; border-color: #ff0000; box-shadow: 0 10px 20px rgba(255, 0, 0, 0.4); }
        .social-btn.gh:hover { background: #333; border-color: #555; box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

        /* Mini Game Section (Tic-Tac-Toe) */
        .game-section { margin-top: 20px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .game-title { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #00f0ff; margin-bottom: 15px; letter-spacing: 1px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 200px; margin: 0 auto; }
        .cell { width: 60px; height: 60px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 28px; cursor: pointer; transition: 0.3s; color: #fff; }
        .cell:hover { background: rgba(0, 240, 255, 0.1); border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        .cell.x { color: #ff003c; text-shadow: 0 0 10px #ff003c; }
        .cell.o { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
        .reset-btn { margin-top: 15px; padding: 8px 20px; background: transparent; border: 1px solid #7000ff; color: #fff; border-radius: 20px; font-family: 'Orbitron', sans-serif; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .reset-btn:hover { background: #7000ff; box-shadow: 0 0 15px rgba(112, 0, 255, 0.5); }

        /* Kazmi Labs Footer */
        .footer { font-size: 12px; color: #666; margin-top: 30px; letter-spacing: 1px; }
        .footer strong { color: #00f0ff; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; font-size: 13px; text-shadow: 0 0 5px rgba(0,240,255,0.3); }

    </style>
</head>
<body>
    
    <canvas id="canvas-bg"></canvas>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="glass-card">
        
        <div class="avatar-container">
            <div class="avatar"><i class="fa-solid fa-user-astronaut"></i></div>
        </div>
        
        <h1>Tajamal Abbas Shah</h1>
        <h2>Digital Brand Management</h2>

        <div class="links">
            <a href="#" class="link-btn amazon"><i class="fa-brands fa-amazon"></i><span>Amazon Affiliate Store</span></a>
            <a href="#" class="link-btn aliexpress"><i class="fa-solid fa-cart-shopping"></i><span>AliExpress Deals</span></a>
            <a href="#" class="link-btn daraz"><i class="fa-solid fa-bag-shopping"></i><span>My Daraz Store</span></a>
            <a href="https://wa.me/923000000000" class="link-btn whatsapp"><i class="fa-brands fa-whatsapp"></i><span>Chat on WhatsApp</span></a>
        </div>

        <div class="socials">
            <a href="#" class="social-btn tw"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" class="social-btn ig"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="social-btn li"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="#" class="social-btn yt"><i class="fa-brands fa-youtube"></i></a>
            <a href="https://github.com/Tajamalshah72" class="social-btn gh"><i class="fa-brands fa-github"></i></a>
        </div>

        <div class="game-section">
            <div class="game-title">Bored? Play a Quick Game!</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <button class="reset-btn" onclick="resetGame()">Reset Game</button>
        </div>

        <div class="footer">
            &copy; 2026 Tajamal.me <br><br> Managed by <strong>Kazmi Labs</strong>
        </div>
    </div>

    <script>
        // 1. Particle Background Magic
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.005;
                if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 100; i++) { particlesArray.push(new Particle()); }
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
        initParticles(); animateParticles();

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        // 2. Neon Tic-Tac-Toe Game Logic
        const cells = document.querySelectorAll('.cell');
        let currentPlayer = 'X';
        let gameActive = true;
        let gameState = ["", "", "", "", "", "", "", "", ""];
        const winningConditions = [ [0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6] ];

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));
            if (gameState[clickedCellIndex] !== "" || !gameActive) return;
            
            gameState[clickedCellIndex] = currentPlayer;
            clickedCell.innerHTML = currentPlayer;
            clickedCell.classList.add(currentPlayer.toLowerCase());
            
            checkWin();
        }

        function checkWin() {
            let roundWon = false;
            for (let i = 0; i <= 7; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]], b = gameState[winCondition[1]], c = gameState[winCondition[2]];
                if (a === '' || b === '' || c === '') continue;
                if (a === b && b === c) { roundWon = true; break; }
            }
            if (roundWon) { alert('Player ' + currentPlayer + ' Wins! 🎉'); gameActive = false; return; }
            let roundDraw = !gameState.includes("");
            if (roundDraw) { alert('Game Draw! 🤝'); gameActive = false; return; }
            
            currentPlayer = currentPlayer === "X" ? "O" : "X";
        }

        function resetGame() {
            gameActive = true;
            currentPlayer = "X";
            gameState = ["", "", "", "", "", "", "", "", ""];
            cells.forEach(cell => { cell.innerHTML = ""; cell.classList.remove('x', 'o'); });
        }
    </script>
</body>
</html>
