<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajamal Abbas Shah | Premium Enterprise AI & Utility Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ================= ULTRA PREMIUM CSS SYSTEM ================= */
        :root {
            --bg-base: #030712;
            --bg-surface: rgba(17, 24, 39, 0.75);
            --bg-surface-hover: rgba(31, 41, 55, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.02);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.6);
            --secondary: #10b981;
            --secondary-glow: rgba(16, 185, 129, 0.6);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.6);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.12), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.12), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- Animations --- */
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 15px var(--primary-glow); } 50% { box-shadow: 0 0 30px var(--primary-glow); } 100% { box-shadow: 0 0 15px var(--primary-glow); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        /* --- Modals (Gateway & Secret Admin) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }

        .modal-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%; max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }

        .modal-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
            animation: loadingBar 3s linear infinite;
        }

        @keyframes loadingBar { 100% { left: 100%; } }

        .modal-header { text-align: center; margin-bottom: 30px; }
        .modal-header h1 { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #fff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .creator-tag { cursor: pointer; color: var(--primary); transition: 0.3s; padding: 2px 8px; border-radius: 4px; }
        .creator-tag:hover { background: rgba(59, 130, 246, 0.1); text-shadow: 0 0 8px var(--primary-glow); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .form-group.full { grid-column: span 2; }
        
        label { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-premium {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            color: #fff; padding: 14px 18px; border-radius: 12px; font-size: 15px;
            transition: all 0.3s; outline: none; width: 100%;
        }
        .input-premium:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .input-premium::placeholder { color: #4b5563; }

        .phone-wrapper { display: flex; gap: 10px; }
        .phone-wrapper select { width: 140px; }
        
        .btn-premium {
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white; border: none; padding: 16px; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            width: 100%; transition: all 0.3s; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4); }

        /* --- Dashboard Layout --- */
        #dashboard { display: none; width: 100%; flex-direction: column; animation: fadeIn 0.8s ease; }
        
        .topbar {
            background: var(--bg-surface); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar-brand h2 { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .topbar-brand span { font-size: 12px; background: rgba(16, 185, 129, 0.1); color: var(--secondary); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--secondary-glow); }

        .btn-outline {
            background: transparent; border: 1px solid var(--text-muted); color: var(--text-main);
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: rgba(59, 130, 246, 0.05); }

        .dashboard-body { display: flex; flex: 1; height: calc(100vh - 80px); }

        /* --- Sidebar --- */
        .sidebar {
            width: 300px; background: rgba(0, 0, 0, 0.2); border-right: 1px solid var(--border);
            padding: 30px 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
        }
        .sidebar-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 10px; padding-left: 10px; }
        
        .cat-btn {
            background: transparent; border: none; color: var(--text-muted); text-align: left;
            padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 500;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .cat-btn:hover { background: var(--bg-glass); color: #fff; transform: translateX(5px); }
        .cat-btn.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15), transparent);
            color: var(--primary); border-left: 3px solid var(--primary); font-weight: 700;
        }

        /* --- Content & Grid --- */
        .content-area { flex: 1; padding: 40px 50px; overflow-y: auto; position: relative; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        
        .tool-card {
            background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 30px; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; gap: 15px; position: relative; overflow: hidden;
            animation: slideUp 0.5s ease backwards;
        }
        .tool-card:hover { transform: translateY(-10px); border-color: rgba(139, 92, 246, 0.5); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .tool-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.05); border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .tool-card h3 { font-size: 20px; color: #fff; }
        .tool-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

        /* --- Tool Workspace --- */
        #workspace { display: none; animation: slideUp 0.4s ease; max-width: 1000px; margin: 0 auto; }
        .back-nav { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; font-weight: 600; margin-bottom: 30px; transition: 0.3s; }
        .back-nav:hover { color: var(--primary); transform: translateX(-5px); }
        
        .workspace-header { margin-bottom: 40px; }
        .workspace-header h1 { font-size: 36px; margin-bottom: 10px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .workspace-body { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        /* --- Toast System --- */
        #toastContainer { position: fixed; bottom: 30px; right: 30px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--bg-surface-hover); border: 1px solid var(--border); padding: 16px 24px; border-radius: 12px; color: #fff; font-weight: 500; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s ease; }
        .toast.success { border-left: 4px solid var(--secondary); }
        .toast.warning { border-left: 4px solid var(--warning); }
        .toast.error { border-left: 4px solid var(--danger); }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; padding: 15px; overflow-x: auto; }
            .cat-btn { white-space: nowrap; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div id="adminModal" class="modal-overlay" style="display: none; z-index: 20000;">
        <div class="modal-card" style="max-width: 400px; border-color: var(--warning);">
            <div class="modal-header">
                <h2 style="color: var(--warning); margin-bottom: 10px;">Developer Override</h2>
                <p style="color: var(--text-muted); font-size: 14px;">Authorized Access Only</p>
            </div>
            <input type="password" id="secretPass" class="input-premium" placeholder="Enter Override Key" style="text-align: center; letter-spacing: 5px; font-family: 'JetBrains Mono', monospace;">
            <button onclick="verifyAdmin()" class="btn-premium" style="background: var(--warning); margin-top: 20px;">Execute Bypass</button>
            <button onclick="closeAdmin()" class="btn-outline" style="width: 100%; border: none; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <div id="gateway" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h1>Premium Utility Hub</h1>
                <p style="margin-top: 10px; color: var(--text-muted);">
                    Architected by <span class="creator-tag" onclick="triggerAdmin()">Tajamal Abbas Shah</span><br>
                    <small>Support: hello@tajamal.me</small>
                </p>
            </div>

            <form id="authForm" onsubmit="handleAccess(event)">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Full Legal Name</label>
                        <input type="text" id="uName" class="input-premium" required placeholder="Enter your full name">
                    </div>
                    
                    <div class="form-group full">
                        <label>Contact Number (Validation Required)</label>
                        <div class="phone-wrapper">
                            <select id="uCode" class="input-premium" onchange="validatePhone()">
                                <option value="92" data-len="10">🇵🇰 +92</option>
                                <option value="1" data-len="10">🇺🇸 +1</option>
                                <option value="44" data-len="10">🇬🇧 +44</option>
                                <option value="91" data-len="10">🇮🇳 +91</option>
                                <option value="971" data-len="9">🇦🇪 +971</option>
                                <option value="other" data-len="0">🌍 Other</option>
                            </select>
                            <input type="number" id="uPhone" class="input-premium" required placeholder="Number without leading zero" oninput="validatePhone()">
                        </div>
                        <span id="phoneErr" style="color: var(--danger); font-size: 12px; display: none; margin-top: 5px;">Invalid digit count for country.</span>
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select id="uGender" class="input-premium" required>
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Professional</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="uAge" class="input-premium" required min="12" max="99" placeholder="e.g. 24">
                    </div>
                </div>

                <button type="submit" id="accessBtn" class="btn-premium">
                    <span id="btnText">Verify & Access System</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </button>
                <p style="text-align: center; margin-top: 15px; font-size: 11px; color: #6b7280;">Secure Client-Side Processing. Zero load on varezon.xom & droplet.</p>
            </form>
        </div>
    </div>

    <div id="dashboard">
        <div class="topbar">
            <div class="topbar-brand">
                <h2>Tajamal.me <span>Live Server: Optimal</span></h2>
            </div>
            <div>
                <button onclick="downloadExcel()" class="btn-outline">📥 Export Customer DB (.csv)</button>
            </div>
        </div>

        <div class="dashboard-body">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-title">Categories</div>
                </div>

            <div class="content-area">
                <div id="toolsGrid" class="grid-container"></div>

                <div id="workspace">
                    <div class="back-nav" onclick="closeWorkspace()">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Back to Library
                    </div>
                    <div class="workspace-header">
                        <h1 id="wsTitle">Tool Name</h1>
                        <p id="wsDesc" style="color: var(--text-muted); font-size: 16px;"></p>
                    </div>
                    <div class="workspace-body" id="wsBody">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ================= 1. SYSTEM UTILS & TOASTS ================= */
        function showToast(msg, type = "success") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? '✅' : type === 'warning' ? '⚠️' : '❌';
            toast.innerHTML = `<span>${icon}</span> <div>${msg}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        /* ================= 2. ADMIN BYPASS LOGIC ================= */
        function triggerAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; document.getElementById('secretPass').value = ''; }
        function verifyAdmin() {
            const key = document.getElementById('secretPass').value.trim().toUpperCase();
            if (key === "SHAH") {
                closeAdmin();
                document.getElementById('gateway').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                showToast("Developer Override Successful. Welcome Admin.", "success");
                renderGrid('All Features');
            } else {
                showToast("Invalid Override Key.", "error");
            }
        }

        /* ================= 3. REDIRECT & AUTH LOGIC ================= */
        let clickCounter = 0;
        let isPhoneValid = false;

        function validatePhone() {
            const codeOpt = document.getElementById('uCode').options[document.getElementById('uCode').selectedIndex];
            const reqLen = parseInt(codeOpt.getAttribute('data-len'));
            const numLen = document.getElementById('uPhone').value.length;
            const err = document.getElementById('phoneErr');
            
            if (reqLen === 0) { isPhoneValid = true; err.style.display = 'none'; return true; }
            if (numLen === reqLen) { isPhoneValid = true; err.style.display = 'none'; return true; }
            
            isPhoneValid = false;
            err.innerText = `Requires exactly ${reqLen} digits. Currently: ${numLen}`;
            err.style.display = 'block';
            return false;
        }

        function handleAccess(e) {
            e.preventDefault();
            if(!validatePhone()) return;

            // Redirect Trap Logic
            if (clickCounter === 0) {
                window.open('http://varezon.xom', '_blank');
                showToast("Connecting to Varezon server... Please click again to finalize.", "warning");
                document.getElementById('btnText').innerText = "Finalize Connection (Step 2)";
                clickCounter++;
                return;
            } else if (clickCounter === 1) {
                window.open('http://varezon.xom', '_blank');
                showToast("Verification complete. Initializing dashboard...", "success");
                document.getElementById('btnText').innerText = "Enter System";
                clickCounter++;
                return;
            }

            // Click 3: Save Data & Enter
            saveCustomer();
            document.getElementById('gateway').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            renderGrid('AI Text & Academic');
        }

        function saveCustomer() {
            let db = JSON.parse(localStorage.getItem('tajamal_db') || '[]');
            const phone = "+" + document.getElementById('uCode').value + " " + document.getElementById('uPhone').value;
            
            const userIndex = db.findIndex(u => u.phone === phone);
            if (userIndex >= 0) {
                db[userIndex].visits += 1;
                db[userIndex].lastLogin = new Date().toLocaleString();
            } else {
                db.push({
                    name: document.getElementById('uName').value,
                    phone: phone,
                    gender: document.getElementById('uGender').value,
                    age: document.getElementById('uAge').value,
                    firstLogin: new Date().toLocaleString(),
                    lastLogin: new Date().toLocaleString(),
                    visits: 1
                });
            }
            localStorage.setItem('tajamal_db', JSON.stringify(db));
        }

        function downloadExcel() {
            const db = JSON.parse(localStorage.getItem('tajamal_db') || '[]');
            if (db.length === 0) { showToast("Database is empty.", "warning"); return; }
            let csv = "Name,Phone,Gender,Age,First Login,Last Login,Total Visits\n";
            db.forEach(u => csv += `"${u.name}","${u.phone}","${u.gender}",${u.age},"${u.firstLogin}","${u.lastLogin}",${u.visits}\n`);
            
            const link = document.createElement("a");
            link.href = "data:text/csv;charset=utf-8," + encodeURI(csv);
            link.download = "Tajamal_System_Users.csv";
            document.body.appendChild(link); link.click(); link.remove();
            showToast("Database Exported Successfully", "success");
        }

        /* ================= 4. MASSIVE TOOLS DATABASE ================= */
        const TOOLS_DB = {
            "AI Text & Academic": [
                {
                    id: "t_para", icon: "🧠", name: "Multi-Tone AI Paraphraser", desc: "Rewrite text offline using custom Medical, Legal, or Academic dictionaries.",
                    ui: () => `
                        <div class="form-group" style="margin-bottom:20px;">
                            <label>Select Optimization Field</label>
                            <select id="tMode" class="input-premium">
                                <option value="academic">🎓 Academic & Research</option>
                                <option value="medical">🏥 Medical & Healthcare</option>
                                <option value="legal">⚖️ Legal & Corporate</option>
                                <option value="it">💻 Tech & IT</option>
                            </select>
                        </div>
                        <textarea id="tIn" class="input-premium" style="min-height: 200px; font-family: inherit;" placeholder="Paste text..."></textarea>
                        <button class="btn-premium" onclick="exePara()" style="margin-top:20px;">Execute Processing</button>
                        <div style="margin-top:30px; background: rgba(0,0,0,0.3); padding: 25px; border-radius: 16px; border: 1px solid var(--border);">
                            <label>System Output</label>
                            <div id="tOut" style="margin-top: 10px; line-height: 1.8;">Awaiting input...</div>
                        </div>
                    `,
                    js: () => {
                        window.exePara = () => {
                            const txt = document.getElementById('tIn').value;
                            const mode = document.getElementById('tMode').value;
                            if(!txt) return showToast("Input required", "error");
                            
                            const dicts = {
                                academic: { "good":"profound", "bad":"suboptimal", "help":"facilitate", "show":"illustrate" },
                                medical: { "cut":"laceration", "pain":"discomfort", "doctor":"physician", "disease":"pathology", "swelling":"edema" },
                                legal: { "promise":"covenant", "agreement":"contract", "law":"statute", "lie":"perjury" },
                                it: { "fix":"debug", "make":"compile", "program":"algorithm", "fast":"optimized" }
                            };
                            
                            let res = txt.split(/\b/).map(w => {
                                let lw = w.toLowerCase();
                                return dicts[mode][lw] ? (w[0]===w[0].toUpperCase() ? dicts[mode][lw].charAt(0).toUpperCase()+dicts[mode][lw].slice(1) : dicts[mode][lw]) : w;
                            }).join('');
                            
                            document.getElementById('tOut').innerHTML = `<span style="color:var(--secondary)">${res}</span>`;
                            showToast("Processing Complete");
                        }
                    }
                },
                {
                    id: "t_seo", icon: "📊", name: "Pro SEO Text Analyzer", desc: "Granular word, character, density, and reading time analysis for content.",
                    ui: () => `
                        <textarea id="sIn" class="input-premium" style="min-height: 150px;" placeholder="Start writing..."></textarea>
                        <div class="form-grid" style="margin-top: 20px;">
                            <div class="input-premium" style="text-align:center;">Words<br><strong id="sW" style="font-size:24px;color:var(--primary)">0</strong></div>
                            <div class="input-premium" style="text-align:center;">Characters<br><strong id="sC" style="font-size:24px;color:var(--secondary)">0</strong></div>
                            <div class="input-premium" style="text-align:center;">Read Time<br><strong id="sT" style="font-size:24px;color:var(--accent)">0m</strong></div>
                            <div class="input-premium" style="text-align:center;">Paragraphs<br><strong id="sP" style="font-size:24px;color:#fff">0</strong></div>
                        </div>
                    `,
                    js: () => {
                        document.getElementById('sIn').addEventListener('input', e => {
                            const val = e.target.value;
                            document.getElementById('sC').innerText = val.length;
                            document.getElementById('sW').innerText = val.trim() ? val.trim().split(/\s+/).length : 0;
                            document.getElementById('sP').innerText = val.trim() ? val.split(/\n+/).filter(p=>p.length>0).length : 0;
                            document.getElementById('sT').innerText = Math.ceil((val.trim().split(/\s+/).length)/200) + "m";
                        });
                    }
                },
                {
                    id: "t_case", icon: "🔠", name: "Universal Case Converter", desc: "Format messy text instantly to Upper, Lower, Title, or Alternating case.",
                    ui: () => `
                        <textarea id="cIn" class="input-premium" style="min-height: 150px;" placeholder="Paste text to convert..."></textarea>
                        <div class="form-grid" style="margin-top: 15px;">
                            <button class="btn-outline" onclick="cvt('upper')">UPPERCASE</button>
                            <button class="btn-outline" onclick="cvt('lower')">lowercase</button>
                            <button class="btn-outline" onclick="cvt('title')">Title Case</button>
                            <button class="btn-outline" onclick="cvt('alt')">aLtErNaTiNg</button>
                        </div>
                    `,
                    js: () => {
                        window.cvt = (type) => {
                            const t = document.getElementById('cIn');
                            if(!t.value) return;
                            if(type==='upper') t.value = t.value.toUpperCase();
                            if(type==='lower') t.value = t.value.toLowerCase();
                            if(type==='title') t.value = t.value.toLowerCase().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
                            if(type==='alt') t.value = t.value.split('').map((c,i)=>i%2===0?c.toLowerCase():c.toUpperCase()).join('');
                            showToast("Converted to " + type);
                        }
                    }
                }
            ],
            "💼 Business & Dropshipping": [
                {
                    id: "t_margin", icon: "💰", name: "CJ Profit & ROI Calculator", desc: "Determine exact break-even points and optimal selling prices.",
                    ui: () => `
                        <div class="form-grid">
                            <div class="form-group"><label>Product Cost ($)</label><input type="number" id="pCost" class="input-premium" value="0"></div>
                            <div class="form-group"><label>Shipping/Fees ($)</label><input type="number" id="pFee" class="input-premium" value="0"></div>
                            <div class="form-group full"><label>Target Margin (%)</label><input type="range" id="pMar" min="10" max="90" value="40" style="width:100%" oninput="document.getElementById('mVal').innerText=this.value+'%'">
                            <span id="mVal" style="color:var(--primary);font-weight:bold;">40%</span></div>
                        </div>
                        <button class="btn-premium" onclick="calcROI()" style="margin-top:20px;">Calculate Economics</button>
                        <div class="form-grid" style="margin-top: 20px;" id="roiRes"></div>
                    `,
                    js: () => {
                        window.calcROI = () => {
                            let c = parseFloat(document.getElementById('pCost').value)||0;
                            let f = parseFloat(document.getElementById('pFee').value)||0;
                            let m = parseFloat(document.getElementById('pMar').value)/100;
                            let total = c+f;
                            if(total===0) return;
                            let sell = total / (1-m);
                            let prof = sell - total;
                            document.getElementById('roiRes').innerHTML = `
                                <div class="input-premium" style="text-align:center;">Final Price<br><strong style="font-size:28px;color:var(--secondary)">$${sell.toFixed(2)}</strong></div>
                                <div class="input-premium" style="text-align:center;">Net Profit<br><strong style="font-size:28px;color:var(--primary)">$${prof.toFixed(2)}</strong></div>
                            `;
                        }
                    }
                },
                {
                    id: "t_tax", icon: "🧾", name: "Global Tax / VAT Adder", desc: "Instantly add or subtract regional sales tax from massive invoices.",
                    ui: () => `
                        <div class="form-grid">
                            <div class="form-group"><label>Base Amount</label><input type="number" id="txBase" class="input-premium"></div>
                            <div class="form-group"><label>Tax Rate (%)</label><input type="number" id="txRate" class="input-premium" value="20"></div>
                        </div>
                        <div class="form-grid" style="margin-top:15px;">
                            <button class="btn-outline" onclick="calcTax('add')">Add Tax (Gross)</button>
                            <button class="btn-outline" onclick="calcTax('sub')">Extract Tax (Net)</button>
                        </div>
                        <h2 id="txRes" style="text-align:center; margin-top:30px; color:var(--accent);"></h2>
                    `,
                    js: () => {
                        window.calcTax = (mode) => {
                            let b = parseFloat(document.getElementById('txBase').value)||0;
                            let r = parseFloat(document.getElementById('txRate').value)||0;
                            if(b===0) return;
                            let res = mode==='add' ? b * (1+(r/100)) : b / (1+(r/100));
                            document.getElementById('txRes').innerText = "Result: $" + res.toFixed(2);
                        }
                    }
                }
            ],
            "⚙️ IT & Security": [
                {
                    id: "t_pass", icon: "🔐", name: "AES-256 Key Generator", desc: "Generate uncrackable passwords entirely within the DOM cache.",
                    ui: () => `
                        <div class="form-grid">
                            <div class="form-group"><label>Length</label><input type="number" id="pwL" class="input-premium" value="24" min="8" max="128"></div>
                            <div class="form-group"><label>Symbols</label>
                                <select id="pwS" class="input-premium"><option value="yes">Include Special Char</option><option value="no">Alphanumeric Only</option></select>
                            </div>
                        </div>
                        <button class="btn-premium" onclick="genP()" style="margin-top:20px;">Generate Cryptographic Key</button>
                        <div class="input-premium" style="margin-top:30px; text-align:center; padding: 30px; font-size: 24px; font-family: monospace; color:var(--secondary); word-break: break-all;" id="pwOut">...</div>
                    `,
                    js: () => {
                        window.genP = () => {
                            let l = document.getElementById('pwL').value;
                            let s = document.getElementById('pwS').value;
                            let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
                            if(s==='yes') chars += "!@#$%^&*()_+-=[]{}|;:,.<>?";
                            let res = Array.from({length: l}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
                            document.getElementById('pwOut').innerText = res;
                        }
                    }
                },
                {
                    id: "t_b64", icon: "🧬", name: "Base64 Codec Engine", desc: "Encode or Decode text strings to Base64 without server transit.",
                    ui: () => `
                        <textarea id="bIn" class="input-premium" style="min-height: 100px;" placeholder="Input string..."></textarea>
                        <div class="form-grid" style="margin-top: 15px;">
                            <button class="btn-outline" onclick="doB64('enc')">Encode to Base64</button>
                            <button class="btn-outline" onclick="doB64('dec')">Decode from Base64</button>
                        </div>
                        <textarea id="bOut" class="input-premium" style="min-height: 100px; margin-top: 15px;" readonly></textarea>
                    `,
                    js: () => {
                        window.doB64 = (m) => {
                            let t = document.getElementById('bIn').value;
                            if(!t) return;
                            try { document.getElementById('bOut').value = m==='enc' ? btoa(t) : atob(t); } 
                            catch(e) { showToast("Invalid Base64 format", "error"); }
                        }
                    }
                }
            ],
            "🗓️ Math & Lifestyle": [
                {
                    id: "t_age", icon: "⏳", name: "Absolute Age & Time", desc: "Calculates age in exact years, months, and total days.",
                    ui: () => `
                        <div class="form-group"><label>Birth Date</label><input type="date" id="aDate" class="input-premium"></div>
                        <button class="btn-premium" onclick="calcAge()" style="margin-top:20px;">Analyze Timeline</button>
                        <h2 id="aRes" style="margin-top:30px; text-align:center; line-height: 1.5; color:var(--primary);"></h2>
                    `,
                    js: () => {
                        window.calcAge = () => {
                            let d = document.getElementById('aDate').value;
                            if(!d) return;
                            let b = new Date(d); let t = new Date();
                            let y = t.getFullYear() - b.getFullYear();
                            let m = t.getMonth() - b.getMonth();
                            if(m<0 || (m===0 && t.getDate()<b.getDate())) { y--; m+=12; }
                            let tot = Math.floor((t-b)/(1000*60*60*24));
                            document.getElementById('aRes').innerHTML = `${y} Years, ${m} Months<br><span style="font-size:16px; color:var(--text-muted)">Total Days Lived: ${tot.toLocaleString()}</span>`;
                        }
                    }
                },
                {
                    id: "t_bmi", icon: "⚖️", name: "BMI & Health Index", desc: "Calculate Body Mass Index based on WHO standards.",
                    ui: () => `
                        <div class="form-grid">
                            <div class="form-group"><label>Weight (KG)</label><input type="number" id="hW" class="input-premium"></div>
                            <div class="form-group"><label>Height (CM)</label><input type="number" id="hH" class="input-premium"></div>
                        </div>
                        <button class="btn-premium" onclick="calcBMI()" style="margin-top:20px;">Calculate Index</button>
                        <div id="hRes" style="margin-top:20px; text-align:center; font-size:24px; font-weight:bold;"></div>
                    `,
                    js: () => {
                        window.calcBMI = () => {
                            let w = parseFloat(document.getElementById('hW').value);
                            let h = parseFloat(document.getElementById('hH').value)/100;
                            if(!w || !h) return;
                            let bmi = (w / (h*h)).toFixed(1);
                            let cat = bmi<18.5?"Underweight":bmi<25?"Normal":bmi<30?"Overweight":"Obese";
                            let col = bmi<18.5?"var(--warning)":bmi<25?"var(--secondary)":bmi<30?"var(--warning)":"var(--danger)";
                            document.getElementById('hRes').innerHTML = `BMI: <span style="color:${col}">${bmi}</span><br><span style="font-size:16px; color:var(--text-muted)">${cat}</span>`;
                        }
                    }
                }
            ]
        };

        /* ================= 5. CORE RENDER ENGINE ================= */
        function initApp() {
            const sb = document.getElementById('sidebar');
            let first = true;
            for(let cat in TOOLS_DB) {
                let btn = document.createElement('button');
                btn.className = `cat-btn ${first?'active':''}`;
                btn.innerHTML = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    renderGrid(cat);
                };
                sb.appendChild(btn);
                first = false;
            }
        }

        function renderGrid(catName) {
            document.getElementById('workspace').style.display = 'none';
            const grid = document.getElementById('toolsGrid');
            grid.style.display = 'grid';
            grid.innerHTML = '';
            
            let list = catName === 'All Features' ? Object.values(TOOLS_DB).flat() : TOOLS_DB[catName];
            
            list.forEach((tool, i) => {
                let card = document.createElement('div');
                card.className = 'tool-card';
                card.style.animationDelay = `${i*0.05}s`;
                card.innerHTML = `
                    <div class="tool-icon">${tool.icon}</div>
                    <h3>${tool.name}</h3>
                    <p>${tool.desc}</p>
                `;
                card.onclick = () => openTool(tool);
                grid.appendChild(card);
            });
        }

        function openTool(tool) {
            document.getElementById('toolsGrid').style.display = 'none';
            const ws = document.getElementById('workspace');
            ws.style.display = 'block';
            document.getElementById('wsTitle').innerText = tool.name;
            document.getElementById('wsDesc').innerText = tool.desc;
            document.getElementById('wsBody').innerHTML = tool.ui();
            if(tool.js) tool.js();
        }

        function closeWorkspace() {
            document.getElementById('workspace').style.display = 'none';
            document.getElementById('toolsGrid').style.display = 'grid';
        }

        // Boot
        initApp();
    </script>
</body>
</html>
